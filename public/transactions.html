<!DOCTYPE html><html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>سجل العمليات</title><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"><style>
body {
  background: #0a0f2a;
  font-family: Arial;
  color: white;
  padding: 20px;
}

h2 {
  text-align: center;
  color: #f0b90b;
}

.back-btn {
  background: rgba(240,185,11,0.15);
  border: 1px solid rgba(240,185,11,0.4);
  color: #f0b90b;
  padding: 10px 16px;
  border-radius: 30px;
  font-weight: bold;
  cursor: pointer;
  margin-bottom: 15px;
  display: flex;
  align-items: center;
  gap: 6px;
  width: fit-content;
}

.back-btn:hover {
  background: rgba(240,185,11,0.3);
}

.item {
  background: #1a2447;
  padding: 14px;
  border-radius: 14px;
  margin-bottom: 12px;
  border: 1px solid rgba(240,185,11,0.15);
}

.row {
  margin-bottom: 6px;
}

.status {
  font-weight: bold;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}

.green { color: #22c55e; }
.red { color: #ef4444; }
.yellow { color: #f0b90b; }
</style></head><body><button class="back-btn" onclick="goBack()">
  <i class="fa-solid fa-arrow-right"></i> رجوع
</button><h2>سجل العمليات</h2><div id="list"></div><script>
const API = "https://sudan-crypto-4mgt.onrender.com";
const email = localStorage.getItem("userEmail");

// الحالات
function getStatusData(status) {
  if (status === "pending") {
    return { text: "قيد المراجعة", color: "yellow", icon: "fa-clock" };
  }
  if (status === "approved") {
    return { text: "مكتمل", color: "green", icon: "fa-circle-check" };
  }
  if (status === "rejected") {
    return { text: "مرفوض", color: "red", icon: "fa-circle-xmark" };
  }
  if (status === "expired") {
    return { text: "منتهي", color: "red", icon: "fa-hourglass-end" };
  }
  if (status === "earned") {
    return { text: "تم إضافة عمولة الفريق", color: "green", icon: "fa-coins" };
  }

  return { text: status, color: "", icon: "fa-question" };
}

// رجوع
function goBack() {
  window.location.href = "dashboard.html";
}

// تحميل البيانات
async function load() {
  if (!email) {
    document.getElementById("list").innerHTML = "لم يتم العثور على المستخدم";
    return;
  }

  const res = await fetch(API + "/transactions/" + email);
  const data = await res.json();

  if (!data.success || !data.data.length) {
    document.getElementById("list").innerHTML = "لا توجد عمليات حالياً";
    return;
  }

  const list = document.getElementById("list");
  list.innerHTML = "";

  data.data.forEach(t => {

    const status = getStatusData(t.status);

    let typeText = "";
    let typeIcon = "";

    let type = t.type;

    if (!type && t.from === "transfer") {
      type = "transfer";
    }

    if (type === "deposit") {
      typeText = "إيداع";
      typeIcon = "fa-arrow-down";

    } else if (type === "withdraw") {
      typeText = "سحب";
      typeIcon = "fa-arrow-up";

    } else if (type === "daily_profit") {
      typeText = "ربح يومي";
      typeIcon = "fa-coins";

    } else if (type === "transfer") {
      typeText = "تحويل أرباح";
      typeIcon = "fa-coins";

    } else if (type === "referral") {
      typeText = `عمولة إحالة (مستوى ${t.level})`;
      typeIcon = "fa-users";
    }

    list.innerHTML += `
      <div class="item">

        <div class="row">
          <i class="fa-solid ${typeIcon}"></i>
          النوع: ${typeText}
        </div>

        <div class="row">
          <i class="fa-solid fa-wallet"></i>
          المبلغ: ${t.amount} USDT
        </div>

        <div class="row status ${status.color}">
          <i class="fa-solid ${status.icon}"></i>
          الحالة: ${status.text}
        </div>

        <div class="row">
          <i class="fa-solid fa-calendar"></i>
          التاريخ: ${new Date(t.date).toLocaleString('ar-EG')}
        </div>

      </div>
    `;
  });
}

load();
</script></body>
</html>
