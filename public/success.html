<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تم الدفع بنجاح</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
  background: linear-gradient(135deg, #0a0f2a, #020617);
  font-family: 'Cairo', sans-serif;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.box {
  background: rgba(15,25,45,0.85);
  padding: 30px;
  border-radius: 25px;
  text-align: center;
  width: 90%;
  max-width: 400px;
  border: 1px solid rgba(240,185,11,0.2);
}

.title {
  font-size: 20px;
  margin-bottom: 10px;
  color: #F0B90B;
}

.loader {
  border: 4px solid rgba(255,255,255,0.1);
  border-top: 4px solid #F0B90B;
  border-radius: 50%;
  width: 60px;
  height: 60px;
  margin: 20px auto;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  100% { transform: rotate(360deg); }
}

.success {
  color: #10b981;
  font-size: 18px;
  margin-top: 15px;
}

.hidden {
  display: none;
}

button {
  margin-top: 20px;
  padding: 12px;
  width: 100%;
  border-radius: 30px;
  border: none;
  background: linear-gradient(90deg, #F0B90B, #FFD966);
  font-weight: bold;
  cursor: pointer;
  color: #0a0f2a;
}

.icon {
  margin-left: 8px;
}
</style>

</head>
<body>

<div class="box">

  <div class="title">
    <i class="fa-solid fa-spinner fa-spin icon"></i>
    جاري تأكيد الدفع
  </div>

  <div class="loader" id="loader"></div>

  <div id="successBox" class="hidden">
    <div class="success">
      <i class="fa-solid fa-circle-check icon"></i>
      تم الدفع بنجاح
    </div>

    <p>تم تفعيل الباقة وإضافة الرصيد</p>

    <button onclick="goDashboard()">
      <i class="fa-solid fa-user icon"></i>
      الدخول إلى حسابي
    </button>
  </div>

</div>

<script>
const API = "https://sudan-crypto-4mgt.onrender.com";
const email = localStorage.getItem("userEmail");

async function checkStatus() {
  try {
    const res = await fetch(API + "/user-data", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ email })
    });

    const data = await res.json();

    if (data.success && data.packageName) {
      document.getElementById("loader").style.display = "none";
      document.getElementById("successBox").classList.remove("hidden");

      setTimeout(() => {
        window.location.href = "dashboard.html";
      }, 3000);

    } else {
      setTimeout(checkStatus, 3000);
    }

  } catch (err) {
    console.log(err);
    setTimeout(checkStatus, 3000);
  }
}

function goDashboard() {
  window.location.href = "dashboard.html";
}

checkStatus();
</script>

</body>
</html>
