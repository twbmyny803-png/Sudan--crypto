<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>سودان كربتو | تسجيل الدخول</title>
  <!-- Google Fonts + Font Awesome -->
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Cairo', 'Tahoma', sans-serif;
      background: radial-gradient(circle at 10% 30%, #0a0f2a, #030617);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
      overflow-x: hidden;
    }

    /* خلفية نجوم متحركة */
    .stars {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }
    .star {
      position: absolute;
      background-color: #ffffff;
      border-radius: 50%;
      opacity: 0.6;
      animation: twinkle 3s infinite alternate;
    }
    @keyframes twinkle {
      0% { opacity: 0.2; transform: scale(1);}
      100% { opacity: 1; transform: scale(1.2);}
    }

    /* كارد زجاجي */
    .glass-card {
      position: relative;
      z-index: 2;
      max-width: 480px;
      width: 100%;
      background: rgba(15, 25, 45, 0.65);
      backdrop-filter: blur(16px);
      border-radius: 48px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 30px 50px rgba(0, 0, 0, 0.5), inset 0 1px 1px rgba(255,255,255,0.1);
      padding: 32px 28px;
      transition: transform 0.3s ease;
    }
    .glass-card:hover {
      transform: translateY(-5px);
    }

    /* العلامة التجارية */
    .brand {
      text-align: center;
      margin-bottom: 20px;
    }
    .brand-icon {
      font-size: 52px;
      background: linear-gradient(135deg, #F0B90B, #FFD966);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 8px;
    }
    .brand h1 {
      font-size: 32px;
      font-weight: 800;
      background: linear-gradient(120deg, #fff, #c0e0ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.5px;
    }
    .brand p {
      color: #a0b4d7;
      font-size: 14px;
      margin-top: 4px;
    }

    h2 {
      font-size: 26px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 28px;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    h2 i {
      color: #F0B90B;
      font-size: 28px;
    }

    /* الحقول */
    .input-group {
      margin-bottom: 22px;
    }
    .input-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
      color: #d0e2ff;
    }
    .input-group label i {
      margin-left: 6px;
      color: #F0B90B;
    }
    .input-group input {
      width: 100%;
      height: 54px;
      background: rgba(10, 20, 35, 0.7);
      border: 1.5px solid rgba(255, 255, 255, 0.2);
      border-radius: 32px;
      padding: 0 20px;
      font-size: 15px;
      color: #fff;
      transition: all 0.25s;
      outline: none;
      font-family: 'Cairo', sans-serif;
    }
    .input-group input:focus {
      border-color: #F0B90B;
      box-shadow: 0 0 0 3px rgba(240, 185, 11, 0.2);
      background: rgba(10, 20, 35, 0.9);
    }
    .input-group input::placeholder {
      color: #6c86a3;
    }

    /* حقل كلمة السر مع زر إظهار */
    .password-wrapper {
      position: relative;
    }
    .password-wrapper input {
      padding-left: 85px;
    }
    .toggle-password {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: #F0B90B;
      border: none;
      border-radius: 40px;
      padding: 6px 18px;
      font-size: 12px;
      font-weight: 700;
      color: #0a0f2a;
      cursor: pointer;
      transition: 0.2s;
    }
    .toggle-password:hover {
      background: #ffcc33;
    }

    /* زر الدخول */
    .login-btn {
      background: linear-gradient(95deg, #F0B90B, #FFD966);
      width: 100%;
      height: 56px;
      border: none;
      border-radius: 44px;
      font-size: 18px;
      font-weight: 800;
      color: #0a0f2a;
      margin-top: 12px;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      box-shadow: 0 8px 20px rgba(240,185,11,0.25);
    }
    .login-btn:hover {
      transform: translateY(-2px);
      background: #ffcc33;
    }

    /* روابط */
    .links {
      text-align: center;
      margin-top: 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .links a {
      color: #F0B90B;
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: 0.2s;
    }
    .links a:hover {
      text-decoration: underline;
      color: #ffdd77;
    }

    /* رسائل التنبيه */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: #1e293b;
      color: white;
      padding: 12px 24px;
      border-radius: 50px;
      font-size: 14px;
      z-index: 1000;
      display: none;
      align-items: center;
      gap: 8px;
      backdrop-filter: blur(12px);
      font-weight: 500;
    }
    .toast.success { background: #10b981; }
    .toast.error { background: #ef4444; }

    /* مودال نسيان كلمة السر */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      z-index: 2000;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(8px);
    }
    .modal-content {
      max-width: 450px;
      width: 90%;
      background: rgba(15, 25, 45, 0.95);
      backdrop-filter: blur(16px);
      border-radius: 48px;
      padding: 28px 24px;
      border: 1px solid rgba(240, 185, 11, 0.3);
      text-align: center;
    }
    .modal-content h3 {
      color: #F0B90B;
      margin-bottom: 16px;
      font-size: 24px;
    }
    .modal-content input {
      width: 100%;
      margin: 10px 0;
      padding: 14px;
      border-radius: 32px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(10,20,35,0.8);
      color: white;
      font-size: 16px;
    }
    .modal-content button {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      border-radius: 40px;
      background: #F0B90B;
      border: none;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
      transition: 0.2s;
    }
    .modal-content button:hover {
      background: #ffcc33;
    }
    .close-modal {
      background: #ef4444 !important;
      color: white;
    }
    .close-modal:hover {
      background: #dc2626 !important;
    }
    .modal-message {
      margin-top: 12px;
      font-size: 13px;
      padding: 8px;
      border-radius: 30px;
    }
    .modal-message.error {
      background: rgba(239, 68, 68, 0.2);
      color: #ef4444;
    }
    .modal-message.success {
      background: rgba(16, 185, 129, 0.2);
      color: #10b981;
    }
    .modal-message.info {
      background: rgba(240, 185, 11, 0.2);
      color: #F0B90B;
    }

    footer {
      text-align: center;
      margin-top: 28px;
      font-size: 11px;
      color: #7c8fb0;
    }

    @media (max-width: 480px) {
      .glass-card { padding: 28px 20px; }
      .login-btn { height: 52px; font-size: 16px; }
    }
  </style>
</head>
<body>

<div class="stars" id="starsContainer"></div>

<div class="glass-card">
  <div class="brand">
    <div class="brand-icon"><i class="fa-brands fa-bitcoin"></i></div>
    <h1>سودان كربتو</h1>
    <p>عالمك الآمن للاستثمار الرقمي</p>
  </div>

  <h2><i class="fa-solid fa-arrow-right-to-bracket"></i> تسجيل الدخول</h2>

  <div class="input-group">
    <label><i class="fa-regular fa-envelope"></i> البريد الإلكتروني</label>
    <input type="email" id="email" placeholder="example@domain.com">
  </div>

  <div class="input-group">
    <label><i class="fa-solid fa-lock"></i> كلمة السر</label>
    <div class="password-wrapper">
      <input type="password" id="password" placeholder="••••••••">
      <button type="button" class="toggle-password" onclick="togglePassword()">إظهار</button>
    </div>
  </div>

  <button class="login-btn" id="loginBtn"><i class="fa-solid fa-arrow-left"></i> دخول</button>

  <div class="links">
    <a href="#" id="forgotPassBtn"><i class="fa-regular fa-circle-question"></i> هل نسيت كلمة السر؟</a>
    <a href="index.html"><i class="fa-regular fa-user-plus"></i> ليس لديك حساب؟ إنشاء حساب جديد</a>
  </div>

  <footer>© 2025 سودان كربتو – استثمر بثقة</footer>
</div>

<!-- مودال نسيان كلمة السر -->
<div id="forgotModal" class="modal">
  <div class="modal-content">
    <h3><i class="fa-solid fa-key"></i> استعادة كلمة المرور</h3>
    
    <div id="resetStep1">
      <p style="color:#ccc; margin-bottom:10px;">أدخل بريدك الإلكتروني</p>
      <input type="email" id="resetEmail" placeholder="البريد الإلكتروني">
      <button id="sendResetCodeBtn">إرسال كود التحقق</button>
      <div id="resetStep1Msg" class="modal-message"></div>
    </div>

    <div id="resetStep2" style="display:none;">
      <p style="color:#ccc; margin-bottom:10px;">أدخل الكود المرسل لبريدك</p>
      <input type="text" id="resetCode" placeholder="كود التحقق (6 أرقام)">
      <button id="verifyResetCodeBtn">تحقق من الكود</button>
      <div id="resetStep2Msg" class="modal-message"></div>
    </div>

    <div id="resetStep3" style="display:none;">
      <p style="color:#ccc; margin-bottom:10px;">أدخل كلمة السر الجديدة</p>
      <input type="password" id="newPassword" placeholder="كلمة السر الجديدة">
      <input type="password" id="confirmNewPassword" placeholder="تأكيد كلمة السر">
      <button id="resetPasswordBtn">تغيير كلمة السر</button>
      <div id="resetStep3Msg" class="modal-message"></div>
    </div>

    <button class="close-modal" onclick="closeResetModal()" style="margin-top:15px;">إغلاق</button>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
  const API_BASE = ""; // اتركه فارغاً إذا كان السيرفر في نفس الدومين
  let resetEmail = '';

  // إنشاء النجوم
  function createStars() {
    const container = document.getElementById('starsContainer');
    for (let i = 0; i < 100; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      const size = Math.random() * 3;
      star.style.width = size + 'px';
      star.style.height = size + 'px';
      star.style.top = Math.random() * 100 + '%';
      star.style.left = Math.random() * 100 + '%';
      star.style.animationDelay = Math.random() * 3 + 's';
      container.appendChild(star);
    }
  }
  createStars();

  function showToast(msg, isError = false) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.style.display = 'flex';
    toast.className = 'toast ' + (isError ? 'error' : 'success');
    setTimeout(() => { toast.style.display = 'none'; }, 3000);
  }

  function showModalMessage(step, msg, isError = false) {
    const msgDiv = document.getElementById(`resetStep${step}Msg`);
    msgDiv.textContent = msg;
    msgDiv.className = 'modal-message ' + (isError ? 'error' : 'success');
  }

  function togglePassword() {
    const passInput = document.getElementById('password');
    const btn = document.querySelector('.toggle-password');
    if (passInput.type === 'password') {
      passInput.type = 'text';
      btn.textContent = 'إخفاء';
    } else {
      passInput.type = 'password';
      btn.textContent = 'إظهار';
    }
  }

  // تسجيل الدخول
  async function login() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value.trim();

    if (!email) return showToast('أدخل البريد الإلكتروني', true);
    if (!password) return showToast('أدخل كلمة السر', true);

    showToast('جاري تسجيل الدخول...');

    try {
      const res = await fetch(`${API_BASE}/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      
      if (data.success) {
        // 🔥 نخزن الاسم والبريد
        localStorage.setItem("name", data.name);
        localStorage.setItem("email", data.email);

        showToast('تم تسجيل الدخول بنجاح');
        
        // 🔥 نوديه للداشبورد
        setTimeout(() => {
          window.location.href = 'dashboard.html';
        }, 1000);
      } else {
        throw new Error(data.message || 'فشل تسجيل الدخول');
      }
    } catch (err) {
      showToast(err.message || 'خطأ في الاتصال', true);
    }
  }

  // ======================= نافذة نسيان كلمة السر =======================
  function openResetModal() {
    document.getElementById('forgotModal').style.display = 'flex';
    document.getElementById('resetStep1').style.display = 'block';
    document.getElementById('resetStep2').style.display = 'none';
    document.getElementById('resetStep3').style.display = 'none';
    document.getElementById('resetEmail').value = '';
    document.getElementById('resetCode').value = '';
    document.getElementById('newPassword').value = '';
    document.getElementById('confirmNewPassword').value = '';
    // مسح الرسائل
    document.getElementById('resetStep1Msg').innerHTML = '';
    document.getElementById('resetStep2Msg').innerHTML = '';
    document.getElementById('resetStep3Msg').innerHTML = '';
  }

  function closeResetModal() {
    document.getElementById('forgotModal').style.display = 'none';
  }

  // الخطوة 1: إرسال كود إعادة التعيين
  async function sendResetCode() {
    const email = document.getElementById('resetEmail').value.trim();
    if (!email) {
      showModalMessage(1, 'أدخل البريد الإلكتروني', true);
      return;
    }
    resetEmail = email;
    showModalMessage(1, 'جاري إرسال الكود...', false);
    try {
      const res = await fetch(`${API_BASE}/forgot-password`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email })
      });
      const data = await res.json();
      if (!data.success) throw new Error(data.message);
      showModalMessage(1, 'تم إرسال كود التحقق إلى بريدك', false);
      document.getElementById('resetStep1').style.display = 'none';
      document.getElementById('resetStep2').style.display = 'block';
    } catch (err) {
      showModalMessage(1, err.message, true);
    }
  }

  // الخطوة 2: التحقق من الكود
  async function verifyResetCode() {
    const code = document.getElementById('resetCode').value.trim();
    if (!code || code.length !== 6) {
      showModalMessage(2, 'أدخل الكود المكون من 6 أرقام', true);
      return;
    }
    showModalMessage(2, 'جاري التحقق...', false);
    try {
      const res = await fetch(`${API_BASE}/verify-reset-code`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: resetEmail, code })
      });
      const data = await res.json();
      if (!data.success) throw new Error(data.message);
      showModalMessage(2, 'تم التحقق من الكود', false);
      document.getElementById('resetStep2').style.display = 'none';
      document.getElementById('resetStep3').style.display = 'block';
    } catch (err) {
      showModalMessage(2, err.message, true);
    }
  }

  // الخطوة 3: تعيين كلمة سر جديدة
  async function resetPassword() {
    const newPass = document.getElementById('newPassword').value.trim();
    const confirmPass = document.getElementById('confirmNewPassword').value.trim();
    if (!newPass || newPass.length < 8) {
      showModalMessage(3, 'كلمة المرور يجب أن تكون 8 أحرف أو أكثر', true);
      return;
    }
    if (newPass !== confirmPass) {
      showModalMessage(3, 'كلمتا المرور غير متطابقتين', true);
      return;
    }
    showModalMessage(3, 'جاري تغيير كلمة المرور...', false);
    try {
      const res = await fetch(`${API_BASE}/reset-password`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: resetEmail, newPassword: newPass })
      });
      const data = await res.json();
      if (!data.success) throw new Error(data.message);
      showModalMessage(3, 'تم تغيير كلمة المرور بنجاح', false);
      setTimeout(() => {
        closeResetModal();
      }, 1500);
    } catch (err) {
      showModalMessage(3, err.message, true);
    }
  }

  // ربط الأحداث
  document.getElementById('loginBtn').addEventListener('click', login);
  document.getElementById('forgotPassBtn').addEventListener('click', (e) => {
    e.preventDefault();
    openResetModal();
  });
  document.getElementById('sendResetCodeBtn').addEventListener('click', sendResetCode);
  document.getElementById('verifyResetCodeBtn').addEventListener('click', verifyResetCode);
  document.getElementById('resetPasswordBtn').addEventListener('click', resetPassword);

  // السماح بتسجيل الدخول بالضغط على Enter
  const inputs = document.querySelectorAll('#email, #password');
  inputs.forEach(input => {
    input.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') login();
    });
  });
</script>
</body>
  </html>
