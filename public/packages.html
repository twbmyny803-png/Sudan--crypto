<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>باقات الاستثمار</title>
    <style>
        body {
            font-family: 'Tahoma', 'Segoe UI', system-ui, sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            width: 100%;
            background: white;
            border-radius: 28px;
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.1);
            padding: 24px 20px 32px 20px;
            text-align: center;
        }
        /* زر الباقات الرئيسي */
        .main-investment-btn {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            font-size: 28px;
            font-weight: bold;
            padding: 18px 20px;
            border: none;
            border-radius: 60px;
            width: 100%;
            cursor: pointer;
            margin-bottom: 40px;
            transition: 0.3s;
            box-shadow: 0 6px 14px rgba(0,0,0,0.2);
            letter-spacing: 1px;
        }
        .main-investment-btn:hover {
            background: linear-gradient(135deg, #2a5298, #1e3c72);
            transform: scale(1.01);
        }
        /* شبكة الباقات الخمسة */
        .packages-grid {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }
        .package-card {
            background: #ffffff;
            border-right: 8px solid #2a5298;
            border-radius: 24px;
            padding: 18px 24px;
            text-align: right;
            box-shadow: 0 5px 12px rgba(0,0,0,0.08);
            transition: all 0.2s ease;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .package-card:hover {
            transform: translateX(-5px);
            box-shadow: 0 12px 20px rgba(0,0,0,0.12);
            background: #fefefe;
        }
        .package-info {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .package-name {
            font-size: 22px;
            font-weight: bold;
            color: #1e2f4e;
        }
        .package-desc {
            font-size: 14px;
            color: #5a6874;
        }
        .package-price {
            background: #eef2fa;
            padding: 8px 18px;
            border-radius: 40px;
            font-weight: bold;
            color: #1e3c72;
            font-size: 18px;
        }
        @media (max-width: 550px) {
            .package-card {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }
            .main-investment-btn {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <!-- زر الباقات الرئيسي (فوق) -->
    <button class="main-investment-btn" id="mainPackagesBtn">
        📦 باقات الاستثمار
    </button>

    <!-- الـ 5 باقات تحت بعض -->
    <div class="packages-grid" id="packagesList">
        <!-- باقة 1 -->
        <div class="package-card" data-package="basic">
            <div class="package-info">
                <div class="package-name">🥉 الباقة الأساسية</div>
                <div class="package-desc">مناسبة للمبتدئين – عائد شهري 5%</div>
            </div>
            <div class="package-price">$ 499</div>
        </div>
        <!-- باقة 2 -->
        <div class="package-card" data-package="silver">
            <div class="package-info">
                <div class="package-name">🥈 الباقة الفضية</div>
                <div class="package-desc">الأكثر طلباً – دعم فوري + عائد 8%</div>
            </div>
            <div class="package-price">$ 1,199</div>
        </div>
        <!-- باقة 3 -->
        <div class="package-card" data-package="gold">
            <div class="package-info">
                <div class="package-name">🥇 الباقة الذهبية</div>
                <div class="package-desc">أرباح متزايدة – استشارات أسبوعية</div>
            </div>
            <div class="package-price">$ 2,499</div>
        </div>
        <!-- باقة 4 -->
        <div class="package-card" data-package="platinum">
            <div class="package-info">
                <div class="package-name">💎 الباقة البلاتينية</div>
                <div class="package-desc">أولوية السحب + نسبة 12%</div>
            </div>
            <div class="package-price">$ 4,999</div>
        </div>
        <!-- باقة 5 -->
        <div class="package-card" data-package="diamond">
            <div class="package-info">
                <div class="package-name">👑 الباقة الماسية</div>
                <div class="package-desc">VIP – أرباح يومية ومحفظة خاصة</div>
            </div>
            <div class="package-price">$ 9,999</div>
        </div>
    </div>
</div>

<script>
    // عند الضغط على أي بطاقة باقة - يمكنك تخصيص الإجراء
    const cards = document.querySelectorAll('.package-card');
    cards.forEach(card => {
        card.addEventListener('click', () => {
            const packageName = card.querySelector('.package-name').innerText;
            alert(`✅ تم اختيار: ${packageName}\nسيتم نقلك لصفحة الدفع أو التفاصيل.`);
            // هنا تقدر تضيف رابط أو إجراء حقيقي:
            // window.location.href = `/packages?type=${card.dataset.package}`;
        });
    });

    // عند الضغط على زر "باقات الاستثمار" العلوي (اختياري: تمرير سلس للباقات)
    const mainBtn = document.getElementById('mainPackagesBtn');
    mainBtn.addEventListener('click', () => {
        document.getElementById('packagesList').scrollIntoView({ behavior: 'smooth', block: 'start' });
        // أو ممكن يخفي/يظهر الباقات لو تحب، لكن الأفضل يمرر لها.
    });
</script>
</body>
</html>
