<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <title>باقات الاستثمار</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #eef2f7;
            font-family: 'Segoe UI', Tahoma, system-ui, sans-serif;
            padding: 40px 20px;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
        }

        /* زر الباقات العلوي */
        .main-btn {
            width: 100%;
            background: #0a2b3e;
            color: white;
            text-align: center;
            padding: 18px;
            font-size: 26px;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            margin-bottom: 40px;
            transition: 0.2s;
            font-family: inherit;
        }

        .main-btn:hover {
            background: #124b66;
        }

        /* قائمة الباقات العمودية */
        .packages-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* بطاقة الباقة الواحدة */
        .package-card {
            background: white;
            border-radius: 20px;
            padding: 20px 24px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            transition: 0.2s;
            border: 1px solid #dee4ec;
        }

        .package-card:hover {
            transform: translateX(-5px);
            box-shadow: 0 10px 22px rgba(0,0,0,0.1);
        }

        .package-info {
            flex: 2;
        }

        .price {
            font-size: 28px;
            font-weight: 800;
            color: #1e4a6b;
        }

        .price small {
            font-size: 14px;
            font-weight: normal;
            color: #6c7a8e;
        }

        .package-name {
            font-size: 20px;
            font-weight: bold;
            color: #1f2f3e;
            margin: 5px 0 4px;
        }

        .stars {
            color: #f5b042;
            font-size: 16px;
            letter-spacing: 2px;
            margin: 5px 0;
        }

        .desc {
            font-size: 13px;
            color: #5a6b7c;
        }

        .buy-btn {
            background: #1e4a6b;
            border: none;
            color: white;
            padding: 10px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
        }

        .buy-btn:hover {
            background: #0f334b;
        }

        @media (max-width: 550px) {
            .package-card {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }
            .buy-btn {
                width: 100%;
                text-align: center;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <button class="main-btn" id="mainPackagesBtn">باقات الاستثمار</button>

    <div class="packages-list" id="packagesList">
        <!-- باقة 50 -->
        <div class="package-card">
            <div class="package-info">
                <div class="price">50 $ <small>شهرياً</small></div>
                <div class="package-name">الباقة البرونزية</div>
                <div class="stars">★★★☆☆</div>
                <div class="desc">بداية ذكية - عائد 4%</div>
            </div>
            <button class="buy-btn" data-price="50">شراء الآن</button>
        </div>

        <!-- باقة 100 -->
        <div class="package-card">
            <div class="package-info">
                <div class="price">100 $ <small>شهرياً</small></div>
                <div class="package-name">الباقة الفضية</div>
                <div class="stars">★★★★☆</div>
                <div class="desc">نمو متوازن - عائد 6%</div>
            </div>
            <button class="buy-btn" data-price="100">شراء الآن</button>
        </div>

        <!-- باقة 250 -->
        <div class="package-card">
            <div class="package-info">
                <div class="price">250 $ <small>شهرياً</small></div>
                <div class="package-name">الباقة الذهبية</div>
                <div class="stars">★★★★★</div>
                <div class="desc">أرباح متوسطة - عائد 9%</div>
            </div>
            <button class="buy-btn" data-price="250">شراء الآن</button>
        </div>

        <!-- باقة 500 -->
        <div class="package-card">
            <div class="package-info">
                <div class="price">500 $ <small>شهرياً</small></div>
                <div class="package-name">الباقة البلاتينية</div>
                <div class="stars">★★★★★</div>
                <div class="desc">أولوية السحب - عائد 12%</div>
            </div>
            <button class="buy-btn" data-price="500">شراء الآن</button>
        </div>

        <!-- باقة 1000 -->
        <div class="package-card">
            <div class="package-info">
                <div class="price">1000 $ <small>شهرياً</small></div>
                <div class="package-name">الباقة الماسية</div>
                <div class="stars">★★★★★</div>
                <div class="desc">VIP - أرباح يومية + محفظة خاصة</div>
            </div>
            <button class="buy-btn" data-price="1000">شراء الآن</button>
        </div>
    </div>
</div>

<script>
    // زر الشراء يحول إلى order.html
    const btns = document.querySelectorAll('.buy-btn');
    btns.forEach(btn => {
        btn.addEventListener('click', function(e) {
            e.stopPropagation();
            const price = this.getAttribute('data-price');
            localStorage.setItem('selectedPackagePrice', price);
            window.location.href = 'order.html';
        });
    });

    // زر باقات الاستثمار العلوي (سكرول سلس للباقات)
    const mainBtn = document.getElementById('mainPackagesBtn');
    mainBtn.addEventListener('click', () => {
        document.getElementById('packagesList').scrollIntoView({ behavior: 'smooth' });
    });
</script>
</body>
</html>
