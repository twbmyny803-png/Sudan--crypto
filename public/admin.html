<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>لوحة الأدمن</title>
<style>
body { background:#0a0f2a; color:white; font-family:Cairo; padding:20px }

.nav {
  margin-bottom:20px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.nav button {
  padding:10px 15px;
  background:#F0B90B;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}

table { width:100%; border-collapse:collapse; margin-top:20px }
td, th { padding:10px; border:1px solid #444 }
button.action { padding:5px 10px; margin:2px; cursor:pointer }
img { border-radius:5px; margin:2px }
</style>
</head>

<body>

<h2>لوحة تحكم الأدمن 🔥</h2>

<div class="nav">
  <a href="admin.html"><button>👤 المستخدمين</button></a>
  <a href="admin-withdraws.html"><button>💸 السحب</button></a>
  <a href="admin-deposits.html"><button>💰 الإيداع</button></a>
  <a href="admin-packages.html"><button>📦 الباقات</button></a>
</div>

<table>
<thead>
<tr>
<th>الاسم</th>
<th>البريد</th>
<th>الهاتف</th>
<th>الرصيد</th>
<th>الصور</th>
<th>الحالة</th>
<th>تحكم</th>
</tr>
</thead>

<tbody id="usersTable"></tbody>
</table>

<script>
const API = "https://sudan-crypto-4mgt.onrender.com";

async function loadUsers() {
  const res = await fetch(API + "/admin-users");
  const data = await res.json();

  const table = document.getElementById("usersTable");
  table.innerHTML = "";

  data.users.forEach(u => {

    const images = u.verificationImages && u.verificationImages.length > 0
      ? u.verificationImages.map(img => {
          const fixed = API + "/" + img.replace(/^\/+/, "");
          return `<img src="${fixed}" width="50">`;
        }).join("")
      : "❌";

    const row = `
    <tr>
      <td>${u.name}</td>
      <td>${u.email}</td>
      <td>${u.phone}</td>
      <td>${u.balance}</td>

      <td>${images}</td>

      <td>
        ${
          u.isVerified
          ? "✅ موثق"
          : u.verificationStatus === "pending"
          ? "⏳ قيد المراجعة"
          : "❌ غير موثق"
        }
      </td>

      <td>
        <button class="action" onclick="verify('${u.email}')">قبول</button>
        <button class="action" onclick="reject('${u.email}')">رفض</button>
        <button class="action" onclick="block('${u.email}')">حظر</button>
        <button class="action" onclick="del('${u.email}')">حذف</button>
      </td>
    </tr>
    `;
    table.innerHTML += row;
  });
}

async function verify(email){
  await fetch(API+"/admin-verify",{
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({email})
  });
  loadUsers();
}

async function reject(email){
  await fetch(API+"/admin-reject-verification",{
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({email})
  });
  loadUsers();
}

async function block(email){
  await fetch(API+"/admin-block",{
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({email})
  });
  loadUsers();
}

async function del(email){
  await fetch(API+"/admin-delete",{
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({email})
  });
  loadUsers();
}

loadUsers();
</script>

</body>
</html>
