<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>لوحة الأدمن</title>
<style>
body { background:#0a0f2a; color:white; font-family:Cairo; padding:20px }
table { width:100%; border-collapse:collapse; margin-top:20px }
td, th { padding:10px; border:1px solid #444 }
button { padding:5px 10px; margin:2px; cursor:pointer }
</style>
</head>

<body>

<h2>لوحة تحكم الأدمن 🔥</h2>

<table id="usersTable">
<thead>
<tr>
<th>الاسم</th>
<th>البريد</th>
<th>الهاتف</th>
<th>الرصيد</th>
<th>توثيق</th>
<th>تحكم</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>
const API = "https://sudan-crypto-4mgt.onrender.com";

async function loadUsers() {
  const res = await fetch(API + "/admin-users");
  const data = await res.json();

  const tbody = document.querySelector("tbody");
  tbody.innerHTML = "";

  data.users.forEach(u => {
    const row = `
    <tr>
      <td>${u.name}</td>
      <td>${u.email}</td>
      <td>${u.phone}</td>
      <td>${u.balance}</td>
      <td>${u.isVerified ? "✅" : "❌"}</td>
      <td>
        <button onclick="verify('${u.email}')">توثيق</button>
        <button onclick="block('${u.email}')">حظر</button>
        <button onclick="del('${u.email}')">حذف</button>
      </td>
    </tr>
    `;
    tbody.innerHTML += row;
  });
}

async function verify(email){
  await fetch(API+"/admin-verify",{method:"POST",headers:{'Content-Type':'application/json'},body:JSON.stringify({email})});
  loadUsers();
}

async function block(email){
  await fetch(API+"/admin-block",{method:"POST",headers:{'Content-Type':'application/json'},body:JSON.stringify({email})});
  loadUsers();
}

async function del(email){
  await fetch(API+"/admin-delete",{method:"POST",headers:{'Content-Type':'application/json'},body:JSON.stringify({email})});
  loadUsers();
}

loadUsers();
</script>

</body>
</html>
