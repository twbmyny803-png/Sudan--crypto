<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>إدارة المستخدمين</title>

<style>
body {
  background:#eef1f6;
  font-family:Cairo;
  margin:0;
}

.header {
  background:#0a0f2a;
  color:white;
  padding:15px;
  text-align:center;
  font-weight:bold;
}

.container {
  padding:15px;
}

.stats {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  margin-bottom:15px;
}

.box {
  background:white;
  padding:15px;
  border-radius:10px;
  text-align:center;
  font-weight:bold;
}

table {
  width:100%;
  border-collapse:collapse;
  background:white;
  border-radius:10px;
  overflow:hidden;
}

th, td {
  padding:10px;
  border-bottom:1px solid #ddd;
  text-align:center;
}

button {
  padding:5px 8px;
  margin:2px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-size:12px;
}

.add {background:#22c55e; color:white;}
.sub {background:#f59e0b; color:white;}
.pkg {background:#3b82f6; color:white;}
.freeze {background:#6366f1; color:white;}
.block {background:#ef4444; color:white;}
.del {background:black; color:white;}
</style>
</head>

<body>

<div class="header">👤 إدارة المستخدمين</div>

<div class="container">

<!-- 🔢 الإحصائيات -->
<div class="stats">
  <div class="box">👥 المستخدمين<br><span id="total">0</span></div>
  <div class="box">💰 إجمالي الرصيد<br><span id="balance">0</span></div>
</div>

<!-- 📋 الجدول -->
<table>
<thead>
<tr>
<th>الاسم</th>
<th>البريد</th>
<th>الهاتف</th>
<th>الرصيد</th>
<th>تحكم</th>
</tr>
</thead>

<tbody id="table"></tbody>
</table>

</div>

<script>
const API = "https://sudan-crypto-4mgt.onrender.com";

async function loadUsers(){
  const res = await fetch(API + "/admin-users");
  const data = await res.json();

  const table = document.getElementById("table");

  let total = 0;
  let totalBalance = 0;

  table.innerHTML = "";

  data.users.forEach(u => {
    total++;
    totalBalance += u.balance || 0;

    table.innerHTML += `
    <tr>
      <td>${u.name}</td>
      <td>${u.email}</td>
      <td>${u.phone}</td>
      <td>${u.balance}</td>

      <td>
        <button class="add" onclick="add('${u.email}')">+ رصيد</button>
        <button class="sub" onclick="sub('${u.email}')">- رصيد</button>
        <button class="pkg" onclick="pkg('${u.email}')">باقه</button>
        <button class="freeze" onclick="freeze('${u.email}')">تجميد</button>
        <button class="block" onclick="block('${u.email}')">حظر</button>
        <button class="del" onclick="delUser('${u.email}')">حذف</button>
      </td>
    </tr>
    `;
  });

  document.getElementById("total").innerText = total;
  document.getElementById("balance").innerText = totalBalance;
}

// ➕ إضافة رصيد
async function add(email){
  let amount = prompt("كم المبلغ؟");
  if(!amount) return;

  await fetch(API+"/admin-add-balance",{
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({email, amount})
  });

  loadUsers();
}

// ➖ خصم
async function sub(email){
  let amount = prompt("كم الخصم؟");
  if(!amount) return;

  await fetch(API+"/admin-sub-balance",{
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({email, amount})
  });

  loadUsers();
}

// 📦 باقة
async function pkg(email){
  let name = prompt("اسم الباقة");
  let profit = prompt("الربح اليومي");

  await fetch(API+"/admin-add-package",{
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      email,
      packageName:name,
      dailyProfit:profit,
      durationDays:280
    })
  });

  loadUsers();
}

// ❄️ تجميد
async function freeze(email){
  await fetch(API+"/admin-freeze",{
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({email})
  });
  loadUsers();
}

// 🚫 حظر
async function block(email){
  await fetch(API+"/admin-block",{
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({email})
  });
  loadUsers();
}

// 🗑️ حذف
async function delUser(email){
  await fetch(API+"/admin-delete",{
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({email})
  });
  loadUsers();
}

loadUsers();
</script>

</body>
</html>
