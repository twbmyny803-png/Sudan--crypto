<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>إدارة المستخدمين</title>

<style>
body {
  background:#eef1f6;
  font-family:Cairo;
  padding:0;
  margin:0;
}

.header {
  background:#0a0f2a;
  color:white;
  padding:15px;
  text-align:center;
  font-size:18px;
}

.container {
  padding:20px;
}

button {
  padding:8px 12px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.refresh {
  background:#3b82f6;
  color:white;
  float:left;
}

table {
  width:100%;
  border-collapse:collapse;
  background:white;
  margin-top:20px;
  border-radius:10px;
  overflow:hidden;
}

th {
  background:#f3f4f6;
  padding:10px;
}

td {
  padding:10px;
  text-align:center;
}

tr {
  border-bottom:1px solid #ddd;
}

.status-ok { color:green }
.status-no { color:red }

.actions button {
  margin:2px;
}

.verify { background:#10b981; color:white }
.block { background:#ef4444; color:white }
.delete { background:black; color:white }

.loading {
  text-align:center;
  padding:20px;
  color:#666;
}
</style>

</head>

<body>

<div class="header">إدارة المستخدمين</div>

<div class="container">

<button class="refresh" onclick="loadUsers()">تحديث القائمة</button>

<table>
<thead>
<tr>
<th>الاسم</th>
<th>البريد</th>
<th>الهاتف</th>
<th>الرصيد</th>
<th>الباقة</th>
<th>محظور</th>
<th>مجمد</th>
<th>التحكم</th>
</tr>
</thead>

<tbody id="usersTable">
<tr><td colspan="8" class="loading">جاري التحميل...</td></tr>
</tbody>
</table>

</div>

<script>
const API = "https://sudan-crypto-4mgt.onrender.com";

// 🔒 حماية الأدمن
if(localStorage.getItem("admin") !== "ok"){
  window.location = "admin-login.html";
}

async function loadUsers() {
  const table = document.getElementById("usersTable");
  table.innerHTML = `<tr><td colspan="8" class="loading">جاري التحميل...</td></tr>`;

  try {
    const res = await fetch(API + "/admin-users");
    const data = await res.json();

    table.innerHTML = "";

    data.users.forEach(u => {
      const row = `
      <tr>
        <td>${u.name}</td>
        <td>${u.email}</td>
        <td>${u.phone}</td>
        <td>${u.balance}</td>
        <td>${u.packageName || "-"}</td>

        <td class="${u.isBlocked ? "status-no" : "status-ok"}">
          ${u.isBlocked ? "نعم" : "لا"}
        </td>

        <td class="${u.isFrozen ? "status-no" : "status-ok"}">
          ${u.isFrozen ? "نعم" : "لا"}
        </td>

        <td class="actions">
          <button class="verify" onclick="verify('${u.email}')">توثيق</button>
          <button class="block" onclick="block('${u.email}')">حظر</button>
          <button class="delete" onclick="del('${u.email}')">حذف</button>
        </td>
      </tr>
      `;

      table.innerHTML += row;
    });

  } catch(err) {
    table.innerHTML = `<tr><td colspan="8">فشل تحميل المستخدمين</td></tr>`;
  }
}

// 🔥 العمليات
async function verify(email){
  await fetch(API+"/admin-verify",{
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({email})
  });
  loadUsers();
}

async function block(email){
  await fetch(API+"/admin-block",{
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({email})
  });
  loadUsers();
}

async function del(email){
  await fetch(API+"/admin-delete",{
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({email})
  });
  loadUsers();
}

loadUsers();
</script>

</body>
</html>
