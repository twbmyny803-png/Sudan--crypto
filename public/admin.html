<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>إدارة المستخدمين - لوحة الأدمن</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #eef1f6; font-family: 'Cairo', 'Tahoma', sans-serif; }
.header { background: #0a0f2a; color: white; padding: 15px; text-align: center; position: relative; }
.back-btn { position: absolute; left: 20px; top: 15px; background: #2d3748; color: white; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; }
.container { padding: 20px; max-width: 1400px; margin: auto; }
.stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 25px; }
.stat-card { background: white; padding: 20px; border-radius: 12px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
.stat-number { font-size: 32px; font-weight: bold; color: #0a0f2a; }
.stat-label { color: #666; margin-top: 5px; }
.search-bar { background: white; padding: 15px; border-radius: 12px; margin-bottom: 20px; display: flex; gap: 10px; flex-wrap: wrap; }
.search-bar input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 8px; }
.search-bar select { padding: 10px; border: 1px solid #ddd; border-radius: 8px; }
.search-bar button { background: #0a0f2a; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; }
.table-wrapper { background: white; border-radius: 12px; overflow-x: auto; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
table { width: 100%; border-collapse: collapse; min-width: 800px; }
th, td { padding: 12px 15px; text-align: center; border-bottom: 1px solid #eee; }
th { background: #0a0f2a; color: white; }
tr:hover { background: #f8f9fa; }
.btn { border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; margin: 3px; font-size: 12px; color: white; }
.btn-sm { padding: 4px 8px; font-size: 11px; }
.btn-danger { background: #ef4444; }
.btn-warning { background: #f59e0b; }
.btn-success { background: #10b981; }
.btn-info { background: #3b82f6; }
.btn-dark { background: #6b7280; }
.btn-primary { background: #0a0f2a; }
.modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; }
.modal-content { background: white; padding: 25px; border-radius: 15px; width: 90%; max-width: 400px; }
.modal-content input, .modal-content select { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; }
.status-active { color: #10b981; font-weight: bold; }
.status-banned { color: #ef4444; font-weight: bold; }
.status-frozen { color: #f59e0b; font-weight: bold; }
footer { margin-top: 20px; text-align: center; padding: 15px; color: #666; }
</style>
</head>
<body>

<div class="header">
  <button class="back-btn" onclick="window.location='admin-dashboard.html'">← رجوع للوحة</button>
  🛡️ إدارة المستخدمين
</div>

<div class="container">
<div class="stats">
  <div class="stat-card"><div class="stat-number" id="totalUsers">0</div><div class="stat-label">إجمالي المستخدمين</div></div>
  <div class="stat-card"><div class="stat-number" id="activeUsers">0</div><div class="stat-label">✅ نشطون</div></div>
  <div class="stat-card"><div class="stat-number" id="bannedUsers">0</div><div class="stat-label">⛔ محظورون</div></div>
  <div class="stat-card"><div class="stat-number" id="frozenUsers">0</div><div class="stat-label">❄️ مجمدون</div></div>
  <div class="stat-card"><div class="stat-number" id="totalBalance">0</div><div class="stat-label">💰 إجمالي الرصيد</div></div>
</div>

<div class="search-bar">
  <input type="text" id="searchInput" placeholder="🔍 بحث بالاسم أو البريد..." onkeyup="filterUsers()">
  <select id="statusFilter" onchange="filterUsers()">
    <option value="all">جميع الحالات</option>
    <option value="active">نشط</option>
    <option value="banned">محظور</option>
    <option value="frozen">مجمد</option>
  </select>
  <button onclick="showAddUserModal()">➕ إضافة مستخدم</button>
</div>

<div class="table-wrapper">
  <table>
    <thead><tr><th>#</th><th>الاسم</th><th>البريد</th><th>الرصيد</th><th>الحالة</th><th>تاريخ التسجيل</th><th>الإجراءات</th></tr></thead>
    <tbody id="usersTable"></tbody>
  </table>
</div>
<footer>🛡️ البيانات قادمة من السيرفر - جميع التعديلات ترسل عبر API</footer>
</div>

<!-- نماذج التعديل -->
<div id="balanceModal" class="modal"><div class="modal-content"><h3>💰 تعديل الرصيد</h3><p id="balanceUserName"></p><input type="number" id="balanceAmount" placeholder="المبلغ"><select id="balanceAction"><option value="add">➕ إضافة</option><option value="deduct">➖ خصم</option></select><button class="btn btn-primary" onclick="processBalance()">تأكيد</button><button class="btn btn-danger" onclick="closeModal('balanceModal')">إلغاء</button></div></div>
<div id="addUserModal" class="modal"><div class="modal-content"><h3>➕ إضافة مستخدم</h3><input type="text" id="newUserName" placeholder="الاسم"><input type="email" id="newUserEmail" placeholder="البريد"><input type="password" id="newUserPassword" placeholder="كلمة المرور"><button class="btn btn-primary" onclick="addUser()">إضافة</button><button class="btn btn-danger" onclick="closeModal('addUserModal')">إلغاء</button></div></div>

<script>
// 🔒 التحقق من جلسة الأدمن
if(localStorage.getItem("admin") !== "ok"){
  window.location = "admin-login.html";
}

// ====================== البيانات تأتي من السيرفر ======================
let users = [];   // فارغة - ستجلب من الـ API

// ====================== دوال جلب البيانات من السيرفر ======================
async function loadUsersFromServer() {
  try {
    // 🔁 غير هذا الرابط ليناسب API الخاص بك
    const response = await fetch('/api/get_users.php');  // أو '/api/users'
    if(!response.ok) throw new Error('فشل في جلب البيانات');
    users = await response.json();
    renderUsers();
  } catch(error) {
    console.error('خطأ:', error);
    document.getElementById("usersTable").innerHTML = '<tr><td colspan="7">❌ فشل تحميل البيانات. تأكد من إعدادات API.</td></tr>';
  }
}

// ====================== دوال إرسال التعديلات للسيرفر ======================
async function updateUserOnServer(userId, action, data = {}) {
  // action: 'ban', 'unban', 'freeze', 'unfreeze', 'delete', 'balance', 'add'
  const payload = { id: userId, action, ...data };
  const response = await fetch('/api/update_user.php', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  });
  if(!response.ok) throw new Error('فشل التحديث');
  return await response.json();
}

// ====================== دوال العرض والفلترة ======================
let currentFilter = "all", currentSearch = "";

function renderUsers() {
  const tbody = document.getElementById("usersTable");
  tbody.innerHTML = "";
  let filtered = users.filter(u => (currentFilter === "all" || u.status === currentFilter) && 
                                   (u.name.includes(currentSearch) || u.email.includes(currentSearch)));
  let active=0, banned=0, frozen=0, totalBal=0;
  filtered.forEach((u,idx) => {
    if(u.status === 'active') active++;
    else if(u.status === 'banned') banned++;
    else if(u.status === 'frozen') frozen++;
    totalBal += u.balance;
    let statusClass = u.status === 'active' ? 'status-active' : (u.status === 'banned' ? 'status-banned' : 'status-frozen');
    let statusText = u.status === 'active' ? '✅ نشط' : (u.status === 'banned' ? '⛔ محظور' : '❄️ مجمد');
    tbody.innerHTML += `<tr>
      <td>${idx+1}</td><td>${u.name}</td><td>${u.email}</td><td>💰 ${u.balance}</td>
      <td class="${statusClass}">${statusText}</td><td>${u.date || '-'}</td>
      <td>
        <button class="btn btn-success btn-sm" onclick="showBalanceModal(${u.id})">💰 رصيد</button>
        <button class="btn btn-info btn-sm" onclick="showPackageModal(${u.id})">📦 باقة</button>
        ${u.status !== 'banned' ? `<button class="btn btn-warning btn-sm" onclick="banUser(${u.id})">⛔ حظر</button>` : `<button class="btn btn-success btn-sm" onclick="unbanUser(${u.id})">✅ إلغاء الحظر</button>`}
        ${u.status !== 'frozen' ? `<button class="btn btn-dark btn-sm" onclick="freezeUser(${u.id})">❄️ تجميد</button>` : `<button class="btn btn-success btn-sm" onclick="unfreezeUser(${u.id})">🔥 إلغاء التجميد</button>`}
        <button class="btn btn-danger btn-sm" onclick="deleteUser(${u.id})">🗑️ حذف</button>
      </td>
    </tr>`;
  });
  document.getElementById("totalUsers").innerHTML = users.length;
  document.getElementById("activeUsers").innerHTML = active;
  document.getElementById("bannedUsers").innerHTML = banned;
  document.getElementById("frozenUsers").innerHTML = frozen;
  document.getElementById("totalBalance").innerHTML = totalBal.toFixed(2);
}

function filterUsers() {
  currentSearch = document.getElementById("searchInput").value;
  currentFilter = document.getElementById("statusFilter").value;
  renderUsers();
}

// ====================== عمليات المستخدمين (ترسل للسيرفر) ======================
let currentUserId = null;

async function banUser(id) {
  if(confirm("⛔ حظر هذا المستخدم؟")) {
    await updateUserOnServer(id, 'ban');
    await loadUsersFromServer();
  }
}
async function unbanUser(id) {
  await updateUserOnServer(id, 'unban');
  await loadUsersFromServer();
}
async function freezeUser(id) {
  if(confirm("❄️ تجميد الحساب؟")) {
    await updateUserOnServer(id, 'freeze');
    await loadUsersFromServer();
  }
}
async function unfreezeUser(id) {
  await updateUserOnServer(id, 'unfreeze');
  await loadUsersFromServer();
}
async function deleteUser(id) {
  if(confirm("⚠️ حذف نهائي؟ لا يمكن التراجع!")) {
    await updateUserOnServer(id, 'delete');
    await loadUsersFromServer();
  }
}
function showBalanceModal(id) {
  currentUserId = id;
  let u = users.find(u=>u.id===id);
  document.getElementById("balanceUserName").innerHTML = `الرصيد الحالي: ${u.balance}`;
  document.getElementById("balanceModal").style.display="flex";
}
async function processBalance() {
  let amount = parseFloat(document.getElementById("balanceAmount").value);
  let action = document.getElementById("balanceAction").value;
  if(isNaN(amount) || amount<=0) { alert("أدخل مبلغ صحيح"); return; }
  await updateUserOnServer(currentUserId, 'balance', { operation: action, amount: amount });
  await loadUsersFromServer();
  closeModal('balanceModal');
}

// ====================== الباقات المحدثة (5 باقات بالأسعار المطلوبة) ======================
function showPackageModal(id) {
  const user = users.find(u => u.id === id);
  if(!user) return;
  
  // قائمة الباقات الخمسة بالأسعار الجديدة: 50, 100, 250, 500, 1000
  const packages = {
    "🥉 الباقة البرونزية": 50,
    "🥈 الباقة الفضية": 100,
    "🥇 الباقة الذهبية": 250,
    "💎 الباقة البلاتينية": 500,
    "👑 الباقة الماسية": 1000
  };
  
  let message = `📦 اختر الباقة لـ ${user.name}:\n\n`;
  for(let [name, price] of Object.entries(packages)) {
    message += `${name} - ${price} جنيه\n`;
  }
  message += `\nاكتب اسم الباقة بالضبط:`;
  
  let choice = prompt(message);
  if(choice && packages[choice]) {
    let amount = packages[choice];
    // إضافة الرصيد عبر السيرفر
    updateUserOnServer(id, 'balance', { operation: 'add', amount: amount })
      .then(() => loadUsersFromServer())
      .then(() => alert(`✅ تمت إضافة ${choice} بقيمة ${amount} جنيه إلى رصيد ${user.name}`))
      .catch(err => alert("حدث خطأ أثناء إضافة الباقة"));
  } else if(choice) {
    alert(`❌ الباقة "${choice}" غير موجودة. اختر من القائمة.`);
  }
}

// ====================== إضافة مستخدم جديد ======================
async function addUser() {
  let name = document.getElementById("newUserName").value;
  let email = document.getElementById("newUserEmail").value;
  let password = document.getElementById("newUserPassword").value;
  if(!name || !email || !password) { alert("املأ جميع الحقول"); return; }
  await updateUserOnServer(0, 'add', { name, email, password });
  await loadUsersFromServer();
  closeModal('addUserModal');
  document.getElementById("newUserName").value = "";
  document.getElementById("newUserEmail").value = "";
  document.getElementById("newUserPassword").value = "";
}

function showAddUserModal() {
  document.getElementById("addUserModal").style.display = "flex";
}

function closeModal(id) {
  document.getElementById(id).style.display = "none";
}

window.onclick = function(e) {
  if(e.target.classList.contains('modal')) e.target.style.display = "none";
}

// تحميل البيانات عند بدء الصفحة
loadUsersFromServer();
</script>
</body>
      </html>
