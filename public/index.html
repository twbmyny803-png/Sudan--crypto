<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>سودان كربتو | إنشاء حساب احترافي</title>
  <!-- Google Fonts & Font Awesome -->
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Cairo', 'Tahoma', sans-serif;
      background: radial-gradient(circle at 10% 30%, #0a0f2a, #030617);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
      overflow-x: hidden;
    }

    /* خلفية متحركة نجوم */
    .stars {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      background: transparent;
      z-index: 0;
    }

    .star {
      position: absolute;
      background-color: #ffffff;
      border-radius: 50%;
      opacity: 0.6;
      animation: twinkle 3s infinite alternate;
    }

    @keyframes twinkle {
      0% { opacity: 0.2; transform: scale(1);}
      100% { opacity: 1; transform: scale(1.2);}
    }

    /* كارد رئيسي */
    .glass-card {
      position: relative;
      z-index: 2;
      max-width: 520px;
      width: 100%;
      background: rgba(15, 25, 45, 0.65);
      backdrop-filter: blur(16px);
      border-radius: 48px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 30px 50px rgba(0, 0, 0, 0.5), inset 0 1px 1px rgba(255,255,255,0.1);
      padding: 32px 28px;
      transition: transform 0.3s ease;
    }

    .glass-card:hover {
      transform: translateY(-5px);
    }

    /* الهيدر */
    .brand {
      text-align: center;
      margin-bottom: 24px;
    }
    .brand-icon {
      font-size: 52px;
      background: linear-gradient(135deg, #F0B90B, #FFD966);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 8px;
    }
    .brand h1 {
      font-size: 32px;
      font-weight: 800;
      background: linear-gradient(120deg, #fff, #c0e0ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.5px;
    }
    .brand p {
      color: #a0b4d7;
      font-size: 14px;
      margin-top: 4px;
    }

    /* العناوين */
    h2 {
      font-size: 26px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 24px;
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    h2 i {
      color: #F0B90B;
      font-size: 28px;
    }

    /* الحقول */
    .input-group {
      margin-bottom: 18px;
      position: relative;
    }
    .input-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
      color: #d0e2ff;
      letter-spacing: 0.3px;
    }
    .input-group label i {
      margin-left: 6px;
      color: #F0B90B;
    }
    .input-group input, .input-group select {
      width: 100%;
      height: 52px;
      background: rgba(10, 20, 35, 0.7);
      border: 1.5px solid rgba(255, 255, 255, 0.2);
      border-radius: 28px;
      padding: 0 18px;
      font-size: 15px;
      color: #fff;
      transition: all 0.25s;
      outline: none;
      font-family: 'Cairo', sans-serif;
    }
    .input-group input:focus, .input-group select:focus {
      border-color: #F0B90B;
      box-shadow: 0 0 0 3px rgba(240, 185, 11, 0.2);
      background: rgba(10, 20, 35, 0.9);
    }
    .input-group input::placeholder {
      color: #6c86a3;
    }

    /* حقل كلمة المرور مع زر إظهار */
    .password-wrapper {
      position: relative;
    }
    .password-wrapper input {
      padding-left: 75px;
    }
    .toggle-password {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: #F0B90B;
      border: none;
      border-radius: 40px;
      padding: 6px 16px;
      font-size: 12px;
      font-weight: 700;
      color: #0a0f2a;
      cursor: pointer;
      transition: 0.2s;
    }
    .toggle-password:hover {
      background: #ffcc33;
    }

    /* زر التحقق */
    .btn-verify {
      background: linear-gradient(95deg, #F0B90B, #FFD966);
      border: none;
      width: 100%;
      height: 50px;
      border-radius: 40px;
      font-weight: 800;
      font-size: 16px;
      color: #0a0f2a;
      cursor: pointer;
      margin-top: 8px;
      transition: 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 6px 14px rgba(240,185,11,0.25);
    }
    .btn-verify:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(240,185,11,0.4);
    }

    /* قسم الكود */
    .code-section {
      background: rgba(0, 0, 0, 0.35);
      border-radius: 32px;
      padding: 16px;
      margin: 18px 0 12px;
      border: 1px solid rgba(240,185,11,0.3);
    }
    .code-box {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin: 12px 0;
      direction: ltr;
    }
    .code-box input {
      width: 52px;
      height: 58px;
      text-align: center;
      font-size: 26px;
      font-weight: 800;
      background: #0f1a2c;
      border: 2px solid #2c3e5c;
      border-radius: 20px;
      color: #F0B90B;
    }
    .timer {
      text-align: center;
      font-size: 13px;
      color: #b9d0ff;
    }
    .resend {
      text-align: center;
      color: #F0B90B;
      margin-top: 10px;
      cursor: pointer;
      font-weight: 600;
      display: none;
    }

    /* زر إنشاء الحساب */
    .btn-register {
      background: linear-gradient(135deg, #F0B90B, #e6a700);
      width: 100%;
      height: 56px;
      border: none;
      border-radius: 44px;
      font-size: 18px;
      font-weight: 800;
      color: #0a0f2a;
      margin-top: 20px;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .btn-register:hover {
      transform: scale(0.98);
      background: #ffcc33;
    }

    /* روابط */
    .links {
      text-align: center;
      margin-top: 24px;
    }
    .links a {
      color: #F0B90B;
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      transition: 0.2s;
    }
    .links a:hover {
      text-decoration: underline;
      color: #ffdd77;
    }

    /* التنبيهات */
    .alert-message {
      margin-top: 12px;
      padding: 10px 14px;
      border-radius: 60px;
      font-size: 13px;
      font-weight: 500;
      text-align: center;
      display: none;
    }
    .alert-success {
      background: #10b98133;
      color: #c6f7e2;
      border: 1px solid #10b981;
    }
    .alert-error {
      background: #ef444433;
      color: #ffb3b3;
      border: 1px solid #ef4444;
    }
    footer {
      text-align: center;
      margin-top: 28px;
      font-size: 11px;
      color: #7c8fb0;
    }

    @media (max-width: 500px) {
      .glass-card { padding: 24px 18px; }
      .code-box input { width: 45px; height: 52px; font-size: 22px; }
    }
  </style>
</head>
<body>

<!-- خلفية نجوم متحركة -->
<div class="stars" id="starsContainer"></div>

<div class="glass-card">
  <div class="brand">
    <div class="brand-icon"><i class="fa-brands fa-bitcoin"></i></div>
    <h1>سودان كربتو</h1>
    <p>منصة الاستثمار الرقمي الأكثر أماناً</p>
  </div>

  <h2><i class="fa-regular fa-user-plus"></i> إنشاء حساب</h2>

  <div class="input-group">
    <label><i class="fa-regular fa-user"></i> الاسم الحقيقي</label>
    <input type="text" id="fullName" placeholder="الاسم الكامل">
  </div>

  <div class="input-group">
    <label><i class="fa-regular fa-envelope"></i> البريد الإلكتروني</label>
    <input type="email" id="email" placeholder="example@domain.com">
  </div>

  <button class="btn-verify" id="sendCodeBtn"><i class="fa-regular fa-paper-plane"></i> تحقق من البريد</button>
  <div class="alert-message" id="sendSuccess"></div>
  <div class="alert-message alert-error" id="sendError"></div>

  <div class="code-section" id="codeSection" style="display: none;">
    <div style="text-align:center; font-weight:700; margin-bottom:8px;"><i class="fa-solid fa-key"></i> أدخل كود التحقق</div>
    <div class="code-box">
      <input type="text" maxlength="1" inputmode="numeric">
      <input type="text" maxlength="1" inputmode="numeric">
      <input type="text" maxlength="1" inputmode="numeric">
      <input type="text" maxlength="1" inputmode="numeric">
      <input type="text" maxlength="1" inputmode="numeric">
      <input type="text" maxlength="1" inputmode="numeric">
    </div>
    <div class="timer"><i class="fa-regular fa-clock"></i> إعادة الإرسال خلال <span id="count">60</span> ثانية</div>
    <div class="resend" id="resendBtn">إرسال الكود مرة أخرى</div>
    <div class="alert-message alert-error" id="verifyError"></div>
  </div>

  <div class="input-group">
    <label><i class="fa-solid fa-phone"></i> رقم الهاتف</label>
    <input type="tel" id="phone" placeholder="+249 رقم الهاتف">
  </div>

  <div class="input-group">
    <label><i class="fa-solid fa-gift"></i> رمز الإحالة (اختياري)</label>
    <input type="text" id="referralCode" placeholder="أدخل الرمز إن وجد">
  </div>

  <div class="input-group">
    <label><i class="fa-solid fa-lock"></i> كلمة المرور</label>
    <div class="password-wrapper">
      <input type="password" id="password" placeholder="••••••••">
      <button class="toggle-password" id="togglePass">إظهار</button>
    </div>
  </div>

  <button class="btn-register" id="registerBtn"><i class="fa-solid fa-user-check"></i> إنشاء الحساب الآن</button>

  <div class="links">
    <a href="login.html">لديك حساب بالفعل؟ تسجيل الدخول <i class="fa-solid fa-arrow-left"></i></a>
  </div>

  <footer>
    &copy; 2024 سودان كربتو - جميع الحقوق محفوظة
  </footer>
</div>

<script>
  // إعداد النجوم الخلفية
  const starsContainer = document.getElementById('starsContainer');
  for (let i = 0; i < 80; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    star.style.left = Math.random() * 100 + '%';
    star.style.top = Math.random() * 100 + '%';
    star.style.width = Math.random() * 3 + 'px';
    star.style.height = star.style.width;
    star.style.animationDelay = Math.random() * 3 + 's';
    starsContainer.appendChild(star);
  }

  // إظهار/إخفاء كلمة المرور
  const togglePass = document.getElementById('togglePass');
  const passwordInput = document.getElementById('password');
  togglePass.addEventListener('click', () => {
    const type = passwordInput.type === 'password' ? 'text' : 'password';
    passwordInput.type = type;
    togglePass.textContent = type === 'password' ? 'إظهار' : 'إخفاء';
  });

  // التعامل مع كود التحقق (الانتقال التلقائي)
  const codeInputs = document.querySelectorAll('.code-box input');
  codeInputs.forEach((input, index) => {
    input.addEventListener('input', (e) => {
      if (e.target.value && index < 5) codeInputs[index + 1].focus();
    });
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Backspace' && !e.target.value && index > 0) codeInputs[index - 1].focus();
    });
  });

  // العداد الزمني
  let timer;
  function startTimer() {
    let count = 60;
    document.getElementById('count').textContent = count;
    document.getElementById('resendBtn').style.display = 'none';
    clearInterval(timer);
    timer = setInterval(() => {
      count--;
      document.getElementById('count').textContent = count;
      if (count <= 0) {
        clearInterval(timer);
        document.getElementById('resendBtn').style.display = 'block';
      }
    }, 1000);
  }

  // تنبيهات
  function showAlert(id, msg, isError = false) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.style.display = 'block';
    el.className = isError ? 'alert-message alert-error' : 'alert-message alert-success';
    setTimeout(() => { el.style.display = 'none'; }, 5000);
  }

  // API Base URL
  const API_BASE = window.location.origin;

  async function sendCode() {
    const email = document.getElementById('email').value;
    if (!email) return showAlert('sendError', '❌ يرجى إدخال البريد الإلكتروني', true);

    showAlert('sendSuccess', '⏳ جاري إرسال الكود...');
    try {
      // ✅ استخدام المسار الكامل للـ API بدلاً من المسار النسبي
      const res = await fetch(`${API_BASE}/send-code`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email })
      });
      const data = await res.json();
      if (!data.success) throw new Error(data.message || 'فشل الإرسال');
      showAlert('sendSuccess', '✅ تم إرسال الكود إلى بريدك');
      document.getElementById('codeSection').style.display = 'block';
      startTimer();
      codeInputs[0].focus();
    } catch (err) {
      showAlert('sendError', err.message || '❌ خطأ في الإرسال', true);
    }
  }

  async function register() {
    const name = document.getElementById('fullName').value;
    const email = document.getElementById('email').value;
    const phone = document.getElementById('phone').value;
    const ref = document.getElementById('referralCode').value;
    const password = document.getElementById('password').value;
    
    // تجميع الكود
    let code = "";
    codeInputs.forEach(input => code += input.value);

    if (!name || !email || !phone || !password || code.length < 6) {
      return alert("يرجى إكمال جميع البيانات وكود التحقق");
    }

    try {
      // 1. التحقق من الكود أولاً
      const verifyRes = await fetch(`${API_BASE}/verify`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, code })
      });
      const verifyData = await verifyRes.json();
      
      if (!verifyData.success) {
        return showAlert('verifyError', '❌ كود التحقق غير صحيح', true);
      }

      // 2. إتمام التسجيل
      const regRes = await fetch(`${API_BASE}/register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email, phone, password, ref })
      });
      const regData = await regRes.json();

      if (regData.success) {
        alert("✅ تم إنشاء الحساب بنجاح!");
        window.location.href = "login.html";
      } else {
        alert(regData.message);
      }
    } catch (err) {
      console.error(err);
      alert("حدث خطأ أثناء التسجيل");
    }
  }

  // ربط الأحداث
  document.getElementById('sendCodeBtn').addEventListener('click', sendCode);
  document.getElementById('resendBtn').addEventListener('click', sendCode);
  document.getElementById('registerBtn').addEventListener('click', register);

  // تعبئة رمز الإحالة من الرابط
  const urlRef = new URLSearchParams(window.location.search).get('ref');
  if (urlRef) document.getElementById('referralCode').value = urlRef;
</script>

</body>
  </html>
