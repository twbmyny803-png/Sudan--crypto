<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Sudan Crypto</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  display: flex;
  justify-content: center;
}

.container {
  width: 350px;
  padding: 20px;
}

.logo {
  text-align: center;
  font-size: 30px;
  margin-bottom: 20px;
  color: #2D6AF6;
}

.logo i {
  font-size: 35px;
}

input {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 8px;
  border: none;
  outline: none;
}

.btn {
  width: 100%;
  padding: 12px;
  background: #2D6AF6;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.password-box {
  position: relative;
}

.password-box i {
  position: absolute;
  right: 10px;
  top: 15px;
  cursor: pointer;
}

.code-box {
  display: flex;
  justify-content: space-between;
  margin: 10px 0;
}

.code-box input {
  width: 45px;
  text-align: center;
  font-size: 20px;
}

.timer {
  text-align: center;
  font-size: 14px;
  margin-top: 5px;
}

.login-bottom {
  text-align: center;
  margin-top: 15px;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">
<i class="fa-brands fa-bitcoin"></i>
سودان كربتو
</div>

<input type="text" placeholder="الاسم الكامل">

<input type="email" id="email" placeholder="البريد الإلكتروني">

<button class="btn" id="sendCode">إرسال الكود</button>
<div class="timer" id="timer"></div>

<!-- مربعات الكود -->
<div class="code-box">
<input maxlength="1">
<input maxlength="1">
<input maxlength="1">
<input maxlength="1">
<input maxlength="1">
<input maxlength="1">
</div>

<input type="text" placeholder="رقم الهاتف +249">

<div class="password-box">
<input type="password" id="password" placeholder="كلمة السر">
<i class="fa-solid fa-eye" onclick="togglePassword()"></i>
</div>

<div class="password-box">
<input type="password" placeholder="تأكيد كلمة السر">
</div>

<input type="text" placeholder="رمز الإحالة (اختياري)">

<button class="btn">إنشاء حساب</button>

<div class="login-bottom">
عندك حساب؟ <a href="#">تسجيل الدخول</a>
</div>

</div>

<script>
let timer = 60;
let interval;

document.getElementById("sendCode").onclick = function() {
  if (timer < 60) return;

  alert("تم إرسال الكود");

  interval = setInterval(() => {
    timer--;
    document.getElementById("timer").innerText = "إعادة الإرسال بعد " + timer + " ثانية";

    if (timer == 0) {
      clearInterval(interval);
      document.getElementById("timer").innerText = "";
      timer = 60;
    }
  }, 1000);
};

// اظهار كلمة السر
function togglePassword() {
  let pass = document.getElementById("password");
  if (pass.type === "password") {
    pass.type = "text";
  } else {
    pass.type = "password";
  }
}

// التنقل بين مربعات الكود
const inputs = document.querySelectorAll(".code-box input");

inputs.forEach((input, index) => {
  input.addEventListener("input", () => {
    if (input.value && index < inputs.length - 1) {
      inputs[index + 1].focus();
    }
  });
});
</script>

</body>
</html>
