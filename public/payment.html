<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إتمام الدفع - باقات الاستثمار</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(145deg, #0a0f1a 0%, #0c1325 100%);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            padding: 40px 20px;
            min-height: 100vh;
            position: relative;
        }
        .stars-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .star-bg {
            position: absolute;
            background: radial-gradient(white, rgba(255,255,255,0.3));
            border-radius: 50%;
            animation: twinkle 3s infinite ease-in-out;
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.2; transform: scale(0.8);}
            50% { opacity: 1; transform: scale(1.2);}
        }
        .container {
            max-width: 650px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }
        .back-btn {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(245,176,66,0.4);
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            color: #f5b042;
            border-radius: 50px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 25px;
        }
        .payment-card {
            background: rgba(15, 22, 40, 0.95);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            border: 1px solid rgba(245,176,66,0.5);
            padding: 32px;
        }
        .title {
            font-size: 28px;
            font-weight: bold;
            text-align: center;
            background: linear-gradient(90deg, #f5b042, #ffd966);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 28px;
        }
        .timer-box {
            text-align: center;
            background: rgba(0,0,0,0.5);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 25px;
            border: 1px solid rgba(245,176,66,0.3);
        }
        .timer-label { color: #f5b042; font-size: 16px; margin-bottom: 10px; }
        .timer-value { font-size: 48px; font-weight: bold; color: #ff6666; font-family: monospace; letter-spacing: 5px; }
        
        .info-box {
            background: rgba(0,0,0,0.4);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 25px;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(245,176,66,0.2);
        }
        .info-label { color: #f5b042; }
        .info-value { color: white; font-weight: bold; }
        
        .qr-box {
            text-align: center;
            margin: 20px 0;
            padding: 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
        }
        .qr-title { color: #f5b042; margin-bottom: 15px; }
        #qrcode {
            display: flex;
            justify-content: center;
            background: white;
            padding: 15px;
            border-radius: 16px;
            display: inline-block;
            margin: 0 auto;
        }
        
        .address-box {
            background: rgba(0,0,0,0.5);
            border-radius: 20px;
            padding: 15px;
            margin: 15px 0;
        }
        .address-value {
            background: #1a1f2f;
            padding: 12px;
            border-radius: 12px;
            color: #ffd966;
            font-family: monospace;
            font-size: 13px;
            word-break: break-all;
            direction: ltr;
            text-align: left;
        }
        .copy-btn {
            background: #f5b042;
            border: none;
            padding: 8px 18px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        /* الحقول المقفلة */
        .transaction-input {
            width: 100%;
            padding: 14px;
            border-radius: 15px;
            border: 1px solid rgba(245,176,66,0.4);
            background: rgba(0,0,0,0.3);
            color: #888;
            margin: 15px 0;
            direction: ltr;
            cursor: not-allowed;
            opacity: 0.6;
        }
        .transaction-input.active {
            background: rgba(0,0,0,0.5);
            color: white;
            cursor: text;
            opacity: 1;
        }
        .file-label {
            display: block;
            background: rgba(245,176,66,0.1);
            border: 1px dashed #888;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            cursor: not-allowed;
            transition: 0.2s;
            opacity: 0.6;
        }
        .file-label.active {
            background: rgba(245,176,66,0.15);
            border-color: #f5b042;
            cursor: pointer;
            opacity: 1;
        }
        .file-label.active:hover {
            background: rgba(245,176,66,0.25);
        }
        .upload-success {
            color: #4caf50;
            margin-top: 10px;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .error-message {
            background: rgba(255,0,0,0.2);
            border: 1px solid #ff4444;
            border-radius: 16px;
            padding: 12px;
            margin: 15px 0;
            color: #ff8888;
            text-align: center;
        }
        .preview-image { text-align: center; margin-top: 10px; }
        .preview-image img { max-width: 100%; max-height: 150px; border-radius: 12px; }
        .confirm-btn {
            width: 100%;
            background: linear-gradient(90deg, #f5b042, #ffd966);
            border: none;
            padding: 16px;
            font-size: 20px;
            font-weight: bold;
            color: #1a1f2f;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        .confirm-btn.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        #fileInput { display: none; }
        .status-message {
            margin-top: 15px;
            padding: 12px;
            border-radius: 16px;
            text-align: center;
            font-weight: bold;
        }
        .status-success {
            background: rgba(76,175,80,0.2);
            border: 1px solid #4caf50;
            color: #4caf50;
        }
        .status-rejected {
            background: rgba(255,0,0,0.2);
            border: 1px solid #ff4444;
            color: #ff8888;
        }
        .status-warning {
            background: rgba(255,193,7,0.2);
            border: 1px solid #ffc107;
            color: #ffc107;
        }
    </style>
</head>
<body>
<div class="stars-bg" id="starsContainer"></div>

<div class="container">
    <button class="back-btn" id="backBtn"><i class="fas fa-arrow-right"></i> رجوع للطلب</button>
    <div class="payment-card">
        <div class="title"><i class="fas fa-credit-card"></i> إتمام الدفع</div>

        <div class="timer-box">
            <div class="timer-label"><i class="fas fa-hourglass-half"></i> الوقت المتبقي لإتمام الدفع</div>
            <div class="timer-value" id="timer">15:00</div>
        </div>

        <!-- رسالة الحالة -->
        <div id="statusMessage" class="status-message" style="display: none;"></div>

        <div class="info-box">
            <div class="info-row">
                <div class="info-label"><i class="fas fa-network-wired"></i> الشبكة المختارة</div>
                <div class="info-value" id="selectedNetwork">-</div>
            </div>
        </div>

        <div class="address-box">
            <div class="address-value" id="walletAddress">-</div>
            <button class="copy-btn" id="copyBtn"><i class="fas fa-copy"></i> نسخ العنوان</button>
        </div>

        <div class="qr-box">
            <div class="qr-title"><i class="fas fa-qrcode"></i> رمز QR للدفع</div>
            <div id="qrcode"></div>
        </div>

        <!-- رقم العملية (مقفل في البداية) -->
        <input type="text" id="transactionId" class="transaction-input" placeholder="رقم العملية (Transaction ID)" disabled>
        
        <!-- رفع الإيصال (مقفل في البداية) -->
        <label class="file-label" id="fileLabel">
            <i class="fas fa-cloud-upload-alt"></i> اضغط لرفع إيصال الدفع
            <input type="file" id="fileInput" accept="image/*" disabled>
        </label>
        <div id="uploadStatus"></div>
        <div class="preview-image" id="preview"></div>

        <button class="confirm-btn" id="confirmPaymentBtn">
            <i class="fas fa-check-circle"></i> تأكيد الدفع
        </button>
    </div>
</div>

<script>
    // نجوم متحركة
    const starsContainer = document.getElementById('starsContainer');
    for (let i = 0; i < 150; i++) {
        const star = document.createElement('div');
        star.classList.add('star-bg');
        const size = Math.random() * 3 + 1;
        star.style.width = size + 'px';
        star.style.height = size + 'px';
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        star.style.animationDelay = Math.random() * 5 + 's';
        star.style.animationDuration = Math.random() * 3 + 2 + 's';
        starsContainer.appendChild(star);
    }

    // قراءة البيانات
    let selectedNetwork = localStorage.getItem('selectedNetwork') || 'BEP20';
    let walletAddress = localStorage.getItem('selectedWalletAddress') || '0x742d35Cc6634C0532925a3b844Bc9e7595f0bEb0';
    let orderNumber = localStorage.getItem('orderNumber') || 'ORD' + Math.floor(Math.random() * 1000000000000) + Date.now().toString().slice(-6);
    
    document.getElementById('selectedNetwork').innerHTML = `<i class="fab ${selectedNetwork === 'TRC20' ? 'fa-tron' : 'fa-bitcoin'}"></i> USDT ${selectedNetwork}`;
    document.getElementById('walletAddress').innerText = walletAddress;
    
    // نسخ
    document.getElementById('copyBtn').addEventListener('click', () => {
        navigator.clipboard.writeText(walletAddress);
        const btn = document.getElementById('copyBtn');
        btn.innerHTML = '<i class="fas fa-check"></i> تم النسخ';
        setTimeout(() => btn.innerHTML = '<i class="fas fa-copy"></i> نسخ العنوان', 2000);
    });

    // QR Code
    try {
        document.getElementById('qrcode').innerHTML = '';
        new QRCode(document.getElementById('qrcode'), {
            text: walletAddress,
            width: 180,
            height: 180,
            colorDark: "#000000",
            colorLight: "#ffffff",
            correctLevel: QRCode.CorrectLevel.H
        });
    } catch(e) {
        console.log("QR error:", e);
    }

    // العناصر
    const transactionInput = document.getElementById('transactionId');
    const fileLabel = document.getElementById('fileLabel');
    const fileInput = document.getElementById('fileInput');
    const confirmBtn = document.getElementById('confirmPaymentBtn');
    const statusDiv = document.getElementById('statusMessage');
    
    // حالة الدفع (من localStorage)
    // 'pending' = لم يدفع, 'paid' = دفع وتم القبول, 'rejected' = دفع وتم الرفض
    let paymentStatus = localStorage.getItem('paymentStatus') || 'pending';
    
    // فتح الحقول إذا كان الطلب مرفوض أو انتهى الوقت
    function unlockFields(message, isError = true) {
        transactionInput.disabled = false;
        transactionInput.classList.add('active');
        fileInput.disabled = false;
        fileLabel.classList.add('active');
        
        if (message) {
            statusDiv.style.display = 'block';
            statusDiv.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-triangle' : 'fa-info-circle'}"></i> ${message}`;
            statusDiv.className = `status-message ${isError ? 'status-rejected' : 'status-warning'}`;
        }
    }
    
    // قفل الحقول
    function lockFields() {
        transactionInput.disabled = true;
        transactionInput.classList.remove('active');
        fileInput.disabled = true;
        fileLabel.classList.remove('active');
    }
    
    // إذا كان مرفوض من قبل، افتح الحقول فوراً
    if (paymentStatus === 'rejected') {
        unlockFields("❌ طلبك السابق تم رفضه. الرجاء إعادة رفع إيصال جديد مع رقم عملية صحيح.", true);
    } else if (paymentStatus === 'paid') {
        lockFields();
        statusDiv.style.display = 'block';
        statusDiv.innerHTML = '<i class="fas fa-check-circle"></i> ✓ تم تأكيد دفعتك بنجاح. سيتم تفعيل الباقة قريباً.';
        statusDiv.className = 'status-message status-success';
        confirmBtn.disabled = true;
        confirmBtn.classList.add('disabled');
    } else {
        // pending: الحقول مقفولة في البداية
        lockFields();
    }
    
    // ⏰ العداد التنازلي 15 دقيقة
    let timeLeft = 15 * 60;
    const timerEl = document.getElementById('timer');
    let timerFinished = false;
    
    function startTimer() {
        const interval = setInterval(function() {
            if (paymentStatus === 'paid') {
                // إذا دفع خلاص، ما نغير شيء
                return;
            }
            
            if (timeLeft <= 0 && !timerFinished) {
                clearInterval(interval);
                timerFinished = true;
                timerEl.innerHTML = "00:00";
                timerEl.style.color = "#ff0000";
                // بعد 15 دقيقة، نفتح الحfields عشان يرفع إيصال متأخر
                if (paymentStatus !== 'paid' && paymentStatus !== 'rejected') {
                    unlockFields("⏰ انتهى وقت الدفع. يمكنك الآن رفع إيصال الدفع لتأكيد طلبك.", false);
                }
            } else if (timeLeft > 0) {
                timeLeft--;
                const mins = Math.floor(timeLeft / 60);
                const secs = timeLeft % 60;
                timerEl.innerHTML = (mins < 10 ? "0" + mins : mins) + ":" + (secs < 10 ? "0" + secs : secs);
            }
        }, 1000);
    }
    
    startTimer();
    
    // رفع الإيصال
    const preview = document.getElementById('preview');
    const uploadStatus = document.getElementById('uploadStatus');
    
    fileInput.addEventListener('change', function(e) {
        if (fileInput.disabled) return;
        
        const file = e.target.files[0];
        if (file) {
            uploadStatus.innerHTML = '<div class="upload-success"><i class="fas fa-spinner fa-pulse"></i> جاري رفع الإيصال...</div>';
            const reader = new FileReader();
            reader.onload = function(ev) {
                preview.innerHTML = `<img src="${ev.target.result}" alt="الإيصال">`;
                uploadStatus.innerHTML = '<div class="upload-success"><i class="fas fa-check-circle"></i> ✓ تم رفع الإيصال بنجاح</div>';
                const label = document.getElementById('fileLabel');
                label.style.background = 'rgba(76, 175, 80, 0.2)';
                label.style.borderColor = '#4caf50';
                setTimeout(() => {
                    if (!fileInput.disabled) {
                        label.style.background = 'rgba(245,176,66,0.15)';
                        label.style.borderColor = '#f5b042';
                    }
                }, 2000);
            };
            reader.readAsDataURL(file);
        }
    });
    
    // تأكيد الدفع - يخزن البيانات ويقفل الحقول
    document.getElementById('confirmPaymentBtn').addEventListener('click', () => {
        const txId = document.getElementById('transactionId').value;
        if (!txId) {
            alert("⚠️ الرجاء إدخال رقم العملية");
            return;
        }
        if (!fileInput.files.length) {
            alert("⚠️ الرجاء رفع إيصال الدفع");
            return;
        }
        
        // حفظ بيانات الدفع
        localStorage.setItem('paymentStatus', 'paid');
        localStorage.setItem('transactionId', txId);
        localStorage.setItem('paymentTime', new Date().toISOString());
        
        // عرض رسالة نجاح في الشاشة
        statusDiv.style.display = 'block';
        statusDiv.innerHTML = '<i class="fas fa-check-circle"></i> ✓ تم استلام طلبك بنجاح! سيتم مراجعة إيصالك وتفعيل الباقة خلال 24 ساعة.';
        statusDiv.className = 'status-message status-success';
        
        // قفل الحقول
        lockFields();
        confirmBtn.disabled = true;
        confirmBtn.classList.add('disabled');
        
        // إخفاء رفع الإيصال
        alert(`✅ تم استلام طلبك بنجاح!\n\n🆔 رقم الطلب: ${orderNumber}\n🔗 الشبكة: ${selectedNetwork}\n🆔 رقم العملية: ${txId}\n\nسيتم مراجعة إيصالك وتفعيل الباقة خلال 24 ساعة.`);
    });
    
    // رجوع
    document.getElementById('backBtn').addEventListener('click', () => {
        window.location.href = 'create-order.html';
    });
    
    // ✅ دالة لرفض الطلب (تناديها من console أو من صفحة الإدارة)
    window.rejectPayment = function(reason) {
        localStorage.setItem('paymentStatus', 'rejected');
        paymentStatus = 'rejected';
        unlockFields(`❌ تم رفض طلبك. السبب: ${reason || 'بيانات الدفع غير صحيحة'}. الرجاء إعادة رفع إيصال جديد.`, true);
        confirmBtn.disabled = false;
        confirmBtn.classList.remove('disabled');
        // إعادة تعيين العداد مش شرط، لكن نفتح الحقول
    };
    
    // ✅ دالة لقبول الطلب (من الإدارة)
    window.approvePayment = function() {
        localStorage.setItem('paymentStatus', 'paid');
        paymentStatus = 'paid';
        statusDiv.style.display = 'block';
        statusDiv.innerHTML = '<i class="fas fa-check-circle"></i> ✓ تم قبول طلبك. سيتم تفعيل الباقة فوراً.';
        statusDiv.className = 'status-message status-success';
        lockFields();
        confirmBtn.disabled = true;
        confirmBtn.classList.add('disabled');
    };
</script>
</body>
    </html>
