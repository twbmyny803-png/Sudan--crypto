<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>إيداع USDT</title>
<!-- Font Awesome للأيقونات -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
    background: linear-gradient(145deg, #0b1120 0%, #152033 50%, #0f172a 100%);
    min-height: 100vh;
    color: #e2e8f0;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 12px;
    margin: 0;
    position: relative;
  }

  body::before {
    content: "";
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: radial-gradient(circle at 20% 30%, rgba(56, 189, 248, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(34, 197, 94, 0.04) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 420px;
    width: 100%;
    margin: auto;
    padding: 4px;
    position: relative;
    z-index: 2;
  }

  /* Header */
  .page-title {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
    padding: 0 8px;
  }

  .page-title h2 {
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: 600;
    font-size: 22px;
    text-shadow: 0 2px 4px rgba(0,0,0,0.3);
  }

  .order-badge {
    background: rgba(245, 158, 11, 0.15);
    padding: 8px 14px;
    border-radius: 40px;
    border: 1px solid rgba(245, 158, 11, 0.3);
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 6px;
    backdrop-filter: blur(4px);
  }

  .order-badge i {
    color: #fbbf24;
  }

  /* Timer عصري */
  .timer-wrapper {
    background: rgba(239, 68, 68, 0.08);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(239, 68, 68, 0.3);
    border-radius: 60px;
    padding: 12px 18px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  .timer-wrapper i {
    color: #ef4444;
    font-size: 20px;
    animation: pulse 1.5s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  .timer-text {
    font-size: 20px;
    font-weight: 700;
    color: #fca5a5;
  }

  .timer-text span {
    color: #fecaca;
    font-size: 22px;
    margin: 0 4px;
  }

  /* Cards */
  .card {
    background: rgba(30, 41, 59, 0.7);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(71, 85, 105, 0.4);
    padding: 20px 18px;
    border-radius: 24px;
    margin-bottom: 16px;
    box-shadow: 0 15px 30px -10px rgba(0,0,0,0.4);
  }

  .network-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .network-badge {
    background: rgba(34, 197, 94, 0.1);
    padding: 8px 16px;
    border-radius: 40px;
    border: 1px solid rgba(34, 197, 94, 0.3);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .network-badge i {
    color: #22c55e;
  }

  .amount-box {
    background: rgba(245, 158, 11, 0.1);
    padding: 8px 16px;
    border-radius: 40px;
    border: 1px solid rgba(245, 158, 11, 0.3);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .amount-box i {
    color: #fbbf24;
  }

  .amount-box input {
    background: transparent;
    border: none;
    color: #fbbf24;
    font-weight: bold;
    font-size: 18px;
    width: 80px;
    text-align: center;
    outline: none;
    pointer-events: none;
  }

  /* QR Code Section */
  .qr-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin: 8px 0 16px;
  }

  #qr {
    border-radius: 20px;
    background: white;
    padding: 10px;
    box-shadow: 0 10px 25px -5px rgba(0,0,0,0.5);
    border: 2px solid #334155;
    width: 200px;
    height: 200px;
  }

  /* Address with Copy */
  .address-container {
    display: flex;
    align-items: center;
    background: rgba(15, 23, 42, 0.8);
    border-radius: 60px;
    border: 1px solid #475569;
    padding: 4px 4px 4px 16px;
    margin: 12px 0;
  }

  .address-container code {
    flex: 1;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    color: #cbd5e1;
    direction: ltr;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    padding: 8px 0;
  }

  .copy-btn {
    background: #3b82f6;
    border: none;
    color: white;
    padding: 12px 18px;
    border-radius: 60px;
    cursor: pointer;
    font-size: 16px;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
    font-weight: 500;
  }

  .copy-btn:hover {
    background: #2563eb;
  }

  .copy-btn.copied {
    background: #22c55e;
  }

  /* رسالة تحذيرية قوية */
  .strong-warning {
    background: linear-gradient(90deg, rgba(239,68,68,0.1), rgba(239,68,68,0.05));
    border-right: 4px solid #ef4444;
    padding: 14px 16px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 16px 0 8px;
  }

  .strong-warning i {
    color: #ef4444;
    font-size: 22px;
  }

  .strong-warning p {
    font-size: 14px;
    font-weight: 500;
    color: #fecaca;
  }

  .strong-warning small {
    color: #f87171;
    display: block;
    margin-top: 4px;
    font-size: 12px;
  }

  /* Form Inputs */
  .input-group {
    margin-bottom: 16px;
    position: relative;
  }

  .input-group i {
    position: absolute;
    right: 16px;
    top: 50%;
    transform: translateY(-50%);
    color: #94a3b8;
    font-size: 16px;
  }

  .input-group input {
    width: 100%;
    padding: 16px 48px 16px 16px;
    background: rgba(15, 23, 42, 0.7);
    border: 1.5px solid #334155;
    border-radius: 60px;
    color: white;
    font-size: 15px;
    outline: none;
    transition: all 0.2s;
  }

  .input-group input:focus {
    border-color: #3b82f6;
    background: #0f172a;
    box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
  }

  /* File Upload عصري */
  .file-upload-wrapper {
    position: relative;
    margin-bottom: 20px;
  }

  .file-upload-wrapper input[type="file"] {
    position: absolute;
    opacity: 0;
    width: 100%;
    height: 100%;
    cursor: pointer;
  }

  .file-upload-custom {
    background: rgba(15, 23, 42, 0.7);
    border: 2px dashed #475569;
    border-radius: 20px;
    padding: 20px 16px;
    text-align: center;
    transition: all 0.2s;
    cursor: pointer;
  }

  .file-upload-custom:hover {
    border-color: #3b82f6;
    background: rgba(59, 130, 246, 0.05);
  }

  .file-upload-custom i {
    font-size: 32px;
    color: #64748b;
    margin-bottom: 8px;
  }

  .file-upload-custom p {
    color: #94a3b8;
    font-size: 14px;
    margin-bottom: 4px;
  }

  .file-upload-custom .file-name {
    color: #22c55e;
    font-size: 13px;
    font-weight: 500;
  }

  /* Submit Button */
  .submit-btn {
    width: 100%;
    padding: 18px;
    background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
    border: none;
    border-radius: 60px;
    color: white;
    font-weight: bold;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    box-shadow: 0 10px 25px -5px #22c55e70;
    border: 1px solid #4ade80;
    transition: all 0.15s;
  }

  .submit-btn:hover {
    background: #16a34a;
    transform: scale(0.98);
  }

  .submit-btn i {
    font-size: 18px;
  }

  /* Helper */
  .text-muted {
    color: #94a3b8;
    font-size: 13px;
    text-align: center;
    margin-top: 12px;
  }

  /* Mobile Optimizations */
  @media (max-width: 380px) {
    .container {
      padding: 2px;
    }
    .card {
      padding: 16px 14px;
    }
    .address-container code {
      font-size: 11px;
    }
    .copy-btn {
      padding: 10px 14px;
      font-size: 14px;
    }
  }
</style>
</head>

<body>

<div class="container">

  <!-- Header مع رقم الطلب -->
  <div class="page-title">
    <h2>
      <i class="fas fa-coins" style="color: #fbbf24;"></i>
      إيداع USDT
    </h2>
    <div class="order-badge">
      <i class="fas fa-hashtag"></i>
      <span id="orderIdDisplay">#ORD-</span>
    </div>
  </div>

  <!-- Timer: متبقي 15 دقيقة -->
  <div class="timer-wrapper">
    <i class="fas fa-hourglass-half"></i>
    <div class="timer-text">
      ⏳ متبقي <span id="timerDisplay">15:00</span> دقيقة
    </div>
  </div>

  <!-- Card: QR & Address -->
  <div class="card">

    <div class="network-row">
      <div class="network-badge">
        <i class="fas fa-link"></i>
        <span>شبكة <strong>TRC20</strong></span>
      </div>
      <div class="amount-box">
        <i class="fas fa-tag"></i>
        <input type="text" id="amountInput" readonly value="50">
        <span style="color: #fbbf24;">USDT</span>
      </div>
    </div>

    <!-- QR Code حقيقي -->
    <div class="qr-section">
      <img id="qr" width="200" height="200" alt="USDT QR Code">
    </div>

    <!-- Address + Copy Button -->
    <div class="address-container">
      <code id="addressText">TW7D7uRnB99zA7h6iMhVAdxifb9taLzcL5</code>
      <button class="copy-btn" id="copyBtn" onclick="copyAddress()">
        <i class="fas fa-copy"></i>
        نسخ
      </button>
    </div>

    <!-- تحذير قوي بدل "أرسل نفس المبلغ بالضبط" -->
    <div class="strong-warning">
      <i class="fas fa-shield-hal"></i>
      <div>
        <p>⚠️ تأكيد المبلغ والمحفظة إجباري</p>
        <small>أي خطأ في الشبكة أو المبلغ يؤدي لفقدان الأصول بشكل دائم</small>
      </div>
    </div>

  </div>

  <!-- Card: نموذج التأكيد -->
  <div class="card">

    <h3 style="display: flex; align-items: center; gap: 10px; margin-bottom: 20px; font-size: 20px;">
      <i class="fas fa-check-circle" style="color: #22c55e;"></i>
      تأكيد الدفع
    </h3>

    <form id="depositForm" enctype="multipart/form-data">

      <!-- حقل TXID -->
      <div class="input-group">
        <i class="fas fa-fingerprint"></i>
        <input type="text" name="txid" placeholder="TXID / رقم عملية التحويل" required>
      </div>

      <!-- File Upload عصري -->
      <div class="file-upload-wrapper">
        <input type="file" name="image" id="fileInput" accept="image/*" required>
        <div class="file-upload-custom" id="fileUploadBox">
          <i class="fas fa-cloud-upload-alt"></i>
          <p>📎 اسحب الصورة هنا أو اضغط للرفع</p>
          <span class="file-name" id="fileNameDisplay">لم يتم اختيار ملف</span>
        </div>
      </div>

      <!-- Submit Button -->
      <button type="submit" class="submit-btn">
        <i class="fas fa-paper-plane"></i>
        تأكيد الطلب
      </button>

    </form>

    <div class="text-muted">
      <i class="fas fa-lock" style="margin-left: 6px;"></i>
      جميع البيانات مشفرة وآمنة
    </div>

  </div>

</div>

<script>
  // ========== إعدادات أساسية ==========
  const address = "TW7D7uRnB99zA7h6iMhVAdxifb9taLzcL5";
  
  // QR Code حقيقي
  document.getElementById("qr").src = 
    `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${address}`;

  // عرض العنوان
  document.getElementById("addressText").innerText = address;

  // ========== رقم طلب عشوائي ==========
  function generateOrderId() {
    const random = Math.floor(Math.random() * 1000000).toString().padStart(6, '0');
    return `#ORD-${random}`;
  }
  const orderId = generateOrderId();
  document.getElementById("orderIdDisplay").innerText = orderId;

  // ========== نسخ العنوان ==========
  window.copyAddress = function() {
    navigator.clipboard.writeText(address).then(() => {
      const btn = document.getElementById("copyBtn");
      btn.innerHTML = '<i class="fas fa-check"></i> تم النسخ';
      btn.classList.add("copied");
      setTimeout(() => {
        btn.innerHTML = '<i class="fas fa-copy"></i> نسخ';
        btn.classList.remove("copied");
      }, 2000);
    });
  };

  // ========== استقبال المبلغ من الرابط ==========
  const params = new URLSearchParams(window.location.search);
  const urlAmount = params.get("amount");
  if (urlAmount) {
    document.getElementById("amountInput").value = urlAmount;
  }

  // ========== File Upload Display ==========
  const fileInput = document.getElementById("fileInput");
  const fileNameDisplay = document.getElementById("fileNameDisplay");
  
  fileInput.addEventListener("change", function() {
    if (this.files && this.files[0]) {
      fileNameDisplay.innerText = this.files[0].name;
      fileNameDisplay.style.color = "#4ade80";
    } else {
      fileNameDisplay.innerText = "لم يتم اختيار ملف";
      fileNameDisplay.style.color = "#94a3b8";
    }
  });

  // ========== تايمر 15 دقيقة ==========
  let totalSeconds = 900; // 15 دقيقة
  const timerDisplay = document.getElementById("timerDisplay");

  const timerInterval = setInterval(() => {
    const minutes = Math.floor(totalSeconds / 60);
    const seconds = totalSeconds % 60;
    
    timerDisplay.innerText = `${minutes}:${seconds < 10 ? "0" : ""}${seconds}`;
    
    totalSeconds--;

    if (totalSeconds < 0) {
      clearInterval(timerInterval);
      alert("⏰ انتهى الوقت المخصص للعملية. يرجى إعادة المحاولة.");
      window.location.reload();
    }
  }, 1000);

  // ========== إرسال النموذج ==========
  document.getElementById("depositForm").onsubmit = async (e) => {
    e.preventDefault();

    const formData = new FormData(e.target);
    
    // إضافة بيانات إضافية
    formData.append("email", localStorage.getItem("email") || "");
    formData.append("orderId", orderId);
    formData.append("expectedAmount", document.getElementById("amountInput").value);

    try {
      const res = await fetch("/submit-deposit", {
        method: "POST",
        body: formData
      });

      const data = await res.json();

      if (data.success) {
        alert("✅ تم استلام طلبك بنجاح\nرقم الطلب: " + orderId);
        // ممكن توجيه المستخدم لصفحة نجاح
      } else {
        alert("❌ حدث خطأ. يرجى المحاولة مرة أخرى.");
      }
    } catch (error) {
      alert("❌ فشل الاتصال بالخادم.");
    }
  };

  // ========== إيقاف التفاعل مع السحب والإفلات ==========
  const uploadBox = document.getElementById("fileUploadBox");
  uploadBox.addEventListener("dragover", (e) => {
    e.preventDefault();
    uploadBox.style.borderColor = "#3b82f6";
  });
  uploadBox.addEventListener("dragleave", () => {
    uploadBox.style.borderColor = "#475569";
  });
  uploadBox.addEventListener("drop", (e) => {
    e.preventDefault();
    uploadBox.style.borderColor = "#475569";
    const files = e.dataTransfer.files;
    if (files.length > 0) {
      fileInput.files = files;
      fileNameDisplay.innerText = files[0].name;
      fileNameDisplay.style.color = "#4ade80";
    }
  });
</script>

</body>
 </html>
