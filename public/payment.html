<!DOCTYPE html><html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الدفع - Sudan Crypto</title><style>
body {
  background: #0a0f2a;
  font-family: Arial;
  color: white;
  text-align: center;
  padding: 40px;
}

.box {
  background: #111933;
  padding: 30px;
  border-radius: 20px;
  max-width: 400px;
  margin: auto;
}

h2 {
  color: #f0b90b;
}

button {
  width: 100%;
  padding: 15px;
  margin-top: 20px;
  border-radius: 30px;
  border: none;
  background: #f0b90b;
  font-size: 18px;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  opacity: 0.8;
}
</style></head><body><div class="box">
  <h2>إتمام الدفع</h2>  <p id="amount"></p>
  <p id="network"></p><button id="payBtn">ادفع الآن</button>

</div><script>
const API = "https://sudan-crypto-4mgt.onrender.com";

const amount = localStorage.getItem("selectedPrice");
const network = localStorage.getItem("selectedNetwork");

document.getElementById("amount").innerText = "المبلغ: " + amount + " USDT";
document.getElementById("network").innerText = "الشبكة: " + network;

document.getElementById("payBtn").onclick = async () => {

  try {
    const res = await fetch(API + "/create-payment", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        amount: parseFloat(amount) || 10
      })
    });

    const data = await res.json();

    if (data.invoice_url) {
      window.location.href = data.invoice_url;
    } else {
      alert("خطأ في إنشاء الدفع");
    }

  } catch (err) {
    alert("فشل الاتصال بالسيرفر");
  }

};
</script></body>
</html>
