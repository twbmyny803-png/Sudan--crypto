<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>الدفع - تأكيد USDT</title>
<!-- Font Awesome للأيقونات البرمجية -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'Segoe UI', 'Arial', sans-serif;
    /* خلفية متطورة: تدرج لوني احترافي بدلاً من اللون الثابت */
    background: linear-gradient(145deg, #0b1120 0%, #152033 50%, #0f172a 100%);
    min-height: 100vh;
    color: #e2e8f0;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    margin: 0;
    /* تأثير نسيج خفيف */
    position: relative;
  }

  /* طبقة شفافة إضافية لتحسين المظهر */
  body::before {
    content: "";
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: radial-gradient(circle at 20% 30%, rgba(56, 189, 248, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(34, 197, 94, 0.04) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 440px;
    width: 100%;
    margin: auto;
    padding: 4px;
    position: relative;
    z-index: 2;
  }

  h2 {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    font-weight: 600;
    letter-spacing: -0.3px;
    text-shadow: 0 2px 4px rgba(0,0,0,0.3);
    margin-bottom: 8px;
  }

  h2 i {
    color: #fbbf24; /* لون ذهبي للتميز */
  }

  h3 {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    margin-bottom: 16px;
  }

  /* خلفية زجاجية متطورة للكروت */
  .card {
    background: rgba(30, 41, 59, 0.7);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(71, 85, 105, 0.4);
    padding: 24px 20px;
    border-radius: 24px;
    margin-top: 20px;
    box-shadow: 0 20px 35px -8px rgba(0,0,0,0.5), inset 0 0 0 1px rgba(255,255,255,0.02);
    transition: transform 0.2s ease;
  }

  .card:first-of-type {
    margin-top: 8px;
  }

  .address {
    background: rgba(15, 23, 42, 0.7);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    border: 1px solid #334155;
    padding: 14px 12px;
    border-radius: 16px;
    word-break: break-all;
    font-family: 'Courier New', monospace;
    font-size: 15px;
    text-align: center;
    direction: ltr;
    color: #cbd5e1;
    letter-spacing: 0.5px;
    box-shadow: inset 0 4px 6px rgba(0,0,0,0.2);
  }

  /* صورة QR */
  #qr {
    border-radius: 18px;
    background: white;
    padding: 8px;
    box-shadow: 0 10px 20px -5px rgba(0,0,0,0.4);
    border: 1px solid #334155;
    margin: 8px 0;
  }

  /* تنسيق الحقول */
  input {
    width: 100%;
    padding: 14px 16px;
    margin: 10px 0;
    border-radius: 40px;
    border: 1.5px solid #334155;
    background: rgba(15, 23, 42, 0.6);
    backdrop-filter: blur(4px);
    color: white;
    font-size: 15px;
    outline: none;
    transition: all 0.2s;
  }

  input:focus {
    border-color: #22c55e;
    box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.2);
    background: #0f172a;
  }

  input[type="file"] {
    padding: 10px;
    background: rgba(15, 23, 42, 0.3);
    cursor: pointer;
  }

  input::file-selector-button {
    background: #334155;
    border: none;
    padding: 8px 16px;
    border-radius: 30px;
    color: white;
    margin-left: 12px;
    cursor: pointer;
    font-weight: bold;
  }

  button {
    padding: 14px 24px;
    background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
    border: none;
    border-radius: 60px;
    cursor: pointer;
    font-weight: bold;
    font-size: 18px;
    color: white;
    width: 100%;
    margin-top: 8px;
    box-shadow: 0 8px 20px -6px #22c55e70;
    transition: all 0.15s;
    border: 1px solid #4ade80;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  button:hover {
    background: #16a34a;
    transform: scale(0.98);
    box-shadow: 0 4px 12px -2px #16a34a;
  }

  .timer {
    color: #facc15;
    font-size: 28px;
    font-weight: 700;
    text-align: center;
    margin-bottom: 5px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    background: rgba(0,0,0,0.2);
    padding: 8px 20px;
    border-radius: 60px;
    width: fit-content;
    margin-left: auto;
    margin-right: auto;
    backdrop-filter: blur(4px);
    border: 1px solid #facc1533;
  }

  /* أيقونات برمجية إضافية */
  .network-badge {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-bottom: 12px;
  }

  .warning-text {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    color: #f87171;
    font-size: 14px;
    margin: 12px 0 4px;
  }

  i {
    margin: 0 4px;
  }
</style>
</head>

<body>

<div class="container">

  <h2>
    <i class="fas fa-coins"></i> 
    إيداع USDT
    <i class="fas fa-arrow-down"></i>
  </h2>

  <!-- التايمر مع أيقونة الساعة البرمجية بدل الإيموجي 🔥 -->
  <div class="timer" id="timer">
    <i class="far fa-clock"></i> 
    <span>10:00</span>
  </div>

  <div class="card">

    <div class="network-badge">
      <i class="fas fa-network-wired"></i>
      <span>الشبكة: <b>TRC20</b></span>
      <i class="fas fa-check-circle" style="color: #22c55e;"></i>
    </div>

    <div class="address" id="address">
      <i class="fas fa-qrcode" style="margin-left: 6px;"></i> 
      TW7D7uRnB99zA7h6iMhVAdxifb9taLzcL5
    </div>

    <br>

    <!-- QR Code مع أيقونة -->
    <div style="position: relative; display: inline-block;">
      <img id="qr" width="200" alt="QR Code">
    </div>

    <!-- تحذير مع أيقونة -->
    <div class="warning-text">
      <i class="fas fa-exclamation-triangle"></i>
      <span>أرسل نفس المبلغ بالضبط</span>
      <i class="fas fa-exclamation-triangle"></i>
    </div>

  </div>

  <div class="card">

    <h3>
      <i class="fas fa-check-double"></i>
      تأكيد الدفع
      <i class="fas fa-pen"></i>
    </h3>

    <form id="depositForm" enctype="multipart/form-data">

      <div style="position: relative;">
        <i class="fas fa-dollar-sign" style="position: absolute; right: 16px; top: 24px; color: #94a3b8;"></i>
        <input type="number" name="amount" placeholder="المبلغ" style="padding-right: 40px;" required>
      </div>

      <div style="position: relative;">
        <i class="fas fa-hashtag" style="position: absolute; right: 16px; top: 24px; color: #94a3b8;"></i>
        <input type="text" name="txid" placeholder="TXID" style="padding-right: 40px;" required>
      </div>

      <div style="position: relative;">
        <i class="fas fa-image" style="position: absolute; right: 16px; top: 22px; color: #94a3b8; z-index: 2;"></i>
        <input type="file" name="image" style="padding-right: 44px;" required>
      </div>

      <button type="submit">
        <i class="fas fa-paper-plane"></i>
        تأكيد الطلب
        <i class="fas fa-chevron-left" style="font-size: 14px;"></i>
      </button>

    </form>

  </div>
</div>

<script>
  // QR Code
  const address = "TW7D7uRnB99zA7h6iMhVAdxifb9taLzcL5";
  document.getElementById("qr").src =
    "https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=" + address;

  // Timer
  let time = 600;
  const timerDisplay = document.querySelector("#timer span");

  const timer = setInterval(() => {
    let minutes = Math.floor(time / 60);
    let seconds = time % 60;

    if (timerDisplay) {
      timerDisplay.innerText = `${minutes}:${seconds < 10 ? "0" : ""}${seconds}`;
    } else {
      document.getElementById("timer").innerText = `${minutes}:${seconds < 10 ? "0" : ""}${seconds}`;
    }

    time--;

    if (time < 0) {
      clearInterval(timer);
      alert("انتهى الوقت، العملية ألغيت");
      window.location.reload();
    }

  }, 1000);

  // إرسال النموذج
  document.getElementById("depositForm").onsubmit = async (e) => {
    e.preventDefault();

    let formData = new FormData(e.target);
    formData.append("email", localStorage.getItem("email") || "");

    const res = await fetch("/submit-deposit", {
      method: "POST",
      body: formData
    });

    const data = await res.json();

    if (data.success) {
      alert("تم إرسال الطلب بنجاح");
    } else {
      alert("حدث خطأ");
    }
  };
</script>

<!-- ملاحظة: السكربت الخاص باستلام المبلغ عبر URL -->
<script>
  // (اختياري) لتحديث حقل المبلغ من رابط الصفحة إن وُجد
  const params = new URLSearchParams(window.location.search);
  const amountParam = params.get("amount");
  if (amountParam) {
    const amountInput = document.querySelector('input[name="amount"]');
    if (amountInput) amountInput.value = amountParam;
  }
</script>

</body>
      </html>
