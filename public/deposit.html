<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>سودان كربتو | إتمام الدفع</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Cairo', sans-serif;
      background: radial-gradient(circle at 10% 30%, #0a0f2a, #030617);
      min-height: 100vh;
      padding: 20px;
      position: relative;
    }
    .stars {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }
    .star {
      position: absolute;
      background-color: #fff;
      border-radius: 50%;
      opacity: 0.6;
      animation: twinkle 3s infinite alternate;
    }
    @keyframes twinkle {
      0% { opacity: 0.2; transform: scale(1);}
      100% { opacity: 1; transform: scale(1.2);}
    }
    .container {
      max-width: 500px;
      margin: 0 auto;
      position: relative;
      z-index: 2;
    }
    .glass-card {
      background: rgba(15, 25, 45, 0.65);
      backdrop-filter: blur(16px);
      border-radius: 32px;
      border: 1px solid rgba(255,255,255,0.2);
      padding: 24px;
      margin-bottom: 16px;
    }
    h2 {
      color: #F0B90B;
      font-size: 22px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .timer-box {
      background: rgba(0,0,0,0.5);
      border-radius: 30px;
      padding: 16px;
      text-align: center;
      margin-bottom: 20px;
    }
    .timer-value {
      font-size: 36px;
      font-weight: bold;
      color: #F0B90B;
      font-family: monospace;
      letter-spacing: 2px;
    }
    .info-row {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      color: #ddd;
      font-size: 14px;
    }
    .address-box {
      background: rgba(0,0,0,0.3);
      border-radius: 20px;
      padding: 16px;
      margin: 16px 0;
      text-align: center;
    }
    .address-text {
      word-break: break-all;
      font-family: monospace;
      font-size: 12px;
      background: rgba(255,255,255,0.1);
      padding: 12px;
      border-radius: 12px;
      margin-bottom: 12px;
    }
    .qr {
      display: flex;
      justify-content: center;
      margin: 16px 0;
    }
    .qr canvas {
      width: 160px;
      height: 160px;
      border-radius: 20px;
      background: white;
      padding: 8px;
    }
    input, .file-label {
      width: 100%;
      padding: 14px;
      margin: 10px 0;
      border-radius: 40px;
      border: 1px solid rgba(240,185,11,0.3);
      background: rgba(10,20,35,0.8);
      color: white;
      font-size: 14px;
    }
    .file-label {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
      background: rgba(240,185,11,0.15);
    }
    button {
      width: 100%;
      padding: 14px;
      border-radius: 40px;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
      transition: 0.2s;
      margin-top: 16px;
    }
    .submit-btn {
      background: linear-gradient(95deg, #F0B90B, #FFD966);
      border: none;
      color: #0a0f2a;
    }
    .submit-btn:hover:not(:disabled) {
      transform: translateY(-2px);
    }
    .submit-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .status {
      text-align: center;
      margin-top: 16px;
      font-size: 14px;
    }
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      padding: 12px 24px;
      border-radius: 50px;
      font-size: 14px;
      z-index: 1000;
      display: none;
      align-items: center;
      gap: 8px;
    }
    .toast.success { background: #10b981; color: white; }
    .toast.error { background: #ef4444; color: white; }
  </style>
</head>
<body>

<div class="stars" id="starsContainer"></div>

<div class="container">

  <div class="glass-card">
    <h2><i class="fa-solid fa-credit-card"></i> إتمام الدفع</h2>
    
    <div class="timer-box">
      <div class="timer-value" id="timer">15:00</div>
      <div style="font-size: 12px;">الوقت المتبقي لإتمام الدفع</div>
    </div>

    <div id="orderDetails"></div>

    <div id="addressBox"></div>

    <div class="qr">
      <canvas id="qrcode"></canvas>
    </div>

    <input type="text" id="txid" placeholder="رقم العملية (TXID)">
    <label class="file-label" onclick="document.getElementById('proof').click()">
      <i class="fa-solid fa-cloud-upload-alt"></i> رفع صورة الإثبات
    </label>
    <input type="file" id="proof" accept="image/*" style="display: none;">
    <div id="fileName" style="font-size: 11px; color: #aaa; margin-top: 5px;"></div>

    <button class="submit-btn" id="submitBtn" onclick="submitPayment()">تأكيد الدفع</button>
    
    <div id="status" class="status"></div>
  </div>

</div>

<div id="toastMessage" class="toast">
  <i class="fa-solid fa-circle-check"></i>
  <span id="toastText"></span>
</div>

<script>
  const API_BASE = "https://sudan-crypto-4mgt.onrender.com";
  const email = localStorage.getItem("userEmail");
  const orderId = localStorage.getItem("orderId");
  const packageName = localStorage.getItem("selectedPackage");
  const amount = localStorage.getItem("selectedPrice");
  const network = localStorage.getItem("selectedNetwork");

  const TRC20_ADDRESS = "TLPZEoW71BNe6mHPK8XRJ5PkN5Agqqpa5n";
  const BEP20_ADDRESS = "0x990635c24b47a3ebbc14efadf0355e26ec706385";

  let timeLeft = 15 * 60; // 15 دقيقة بالثواني
  let timerInterval = null;
  let orderCreated = false;
  let canSubmit = true;

  if (!email || !orderId || !network) window.location.href = "packages.html";

  document.getElementById('orderDetails').innerHTML = `
    <div class="info-row"><span><i class="fa-solid fa-hashtag"></i> رقم الطلب</span><span>${orderId}</span></div>
    <div class="info-row"><span><i class="fa-solid fa-box"></i> الباقة</span><span>${packageName}</span></div>
    <div class="info-row"><span><i class="fa-solid fa-dollar-sign"></i> المبلغ</span><span>${amount} USDT</span></div>
    <div class="info-row"><span><i class="fa-solid fa-network-wired"></i> الشبكة</span><span>${network}</span></div>
  `;

  const address = network === "TRC20" ? TRC20_ADDRESS : BEP20_ADDRESS;
  document.getElementById('addressBox').innerHTML = `
    <div class="address-box">
      <div class="address-text">${address}</div>
      <button onclick="copyAddress()" style="background: rgba(240,185,11,0.2); border: none; padding: 8px 16px; border-radius: 40px; color: #F0B90B; cursor: pointer;"><i class="fa-regular fa-copy"></i> نسخ العنوان</button>
    </div>
  `;

  QRCode.toCanvas(document.getElementById('qrcode'), address, { width: 160, margin: 1 });

  function copyAddress() {
    navigator.clipboard.writeText(address);
    showToast("تم نسخ العنوان");
  }

  function showToast(message, isError = false) {
    const toast = document.getElementById('toastMessage');
    const toastText = document.getElementById('toastText');
    const icon = toast.querySelector('i');
    toastText.innerText = message;
    if (isError) {
      icon.className = 'fa-solid fa-circle-exclamation';
      toast.className = 'toast error';
    } else {
      icon.className = 'fa-solid fa-circle-check';
      toast.className = 'toast success';
    }
    toast.style.display = 'flex';
    setTimeout(() => toast.style.display = 'none', 3000);
  }

  function updateTimer() {
    const minutes = Math.floor(timeLeft / 60);
    const seconds = timeLeft % 60;
    document.getElementById('timer').innerText = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
    
    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      document.getElementById('timer').innerText = "00:00";
      document.getElementById('status').innerHTML = '<span style="color: #ef4444;">انتهى الوقت! لم يعد بإمكانك إرسال إثبات الدفع.</span>';
      canSubmit = false;
      document.getElementById('submitBtn').disabled = true;
    }
    timeLeft--;
  }

  timerInterval = setInterval(updateTimer, 1000);

  document.getElementById('proof').addEventListener('change', function(e) {
    if (e.target.files.length > 0) {
      document.getElementById('fileName').innerHTML = `<i class="fa-solid fa-file-image"></i> ${e.target.files[0].name}`;
    }
  });

  async function createOrder() {
    if (orderCreated) return;
    try {
      await fetch(`${API_BASE}/manual-deposit`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, amount, packageName, orderId })
      });
      orderCreated = true;
    } catch (err) { console.error(err); }
  }
  createOrder();

  async function submitPayment() {
    if (!canSubmit) {
      showToast("انتهى الوقت! لا يمكن إرسال الطلب.", true);
      return;
    }
    const txid = document.getElementById('txid').value.trim();
    const file = document.getElementById('proof').files[0];
    
    if (!txid) {
      showToast("يرجى إدخال رقم العملية (TXID)", true);
      return;
    }
    if (!file) {
      showToast("يرجى رفع صورة الإثبات", true);
      return;
    }

    document.getElementById('status').innerHTML = '<span style="color: #F0B90B;">جاري الإرسال...</span>';
    document.getElementById('submitBtn').disabled = true;

    try {
      // تعديل هنا لاستخدام الرابط المباشر لرفع الصورة
      const formData = new FormData();
      formData.append('file', file);
      
      const uploadRes = await fetch("https://sudan-crypto-4mgt.onrender.com/upload-proof", {
        method: "POST",
        body: formData
      });
      const uploadData = await uploadRes.json();
      
      if (!uploadData.success) {
        throw new Error(uploadData.message || "فشل رفع الصورة");
      }

      const res = await fetch(`${API_BASE}/deposit-request`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          email,
          name: localStorage.getItem("userName") || "user",
          amount,
          txid,
          image: uploadData.imageUrl,
          orderId,
          packageName,
          network
        })
      });

      const data = await res.json();

      if (data.success) {
        document.getElementById('status').innerHTML = '<span style="color: #10b981;">✓ تم إرسال طلب الدفع بنجاح! سيتم المراجعة قريباً.</span>';
        showToast("تم إرسال طلب الدفع بنجاح");
        setTimeout(() => window.location.href = "dashboard.html", 3000);
      } else {
        document.getElementById('status').innerHTML = '<span style="color: #ef4444;">فشل الإرسال، حاول مرة أخرى</span>';
        document.getElementById('submitBtn').disabled = false;
        showToast(data.message || "فشل الإرسال", true);
      }

    } catch (err) {
      document.getElementById('status').innerHTML = `<span style="color: #ef4444;">خطأ: ${err.message}</span>`;
      document.getElementById('submitBtn').disabled = false;
      showToast(err.message || "خطأ في الاتصال", true);
    }
  }

  function createStars() {
    const container = document.getElementById('starsContainer');
    for (let i = 0; i < 150; i++) {
      const star = document.createElement('div');
      star.classList.add('star');
      star.style.width = (Math.random() * 3 + 1) + 'px';
      star.style.height = star.style.width;
      star.style.left = Math.random() * 100 + '%';
      star.style.top = Math.random() * 100 + '%';
      star.style.animationDelay = Math.random() * 5 + 's';
      star.style.animationDuration = (Math.random() * 3 + 2) + 's';
      container.appendChild(star);
    }
  }
  createStars();
</script>

</body>
</html>
