<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>سودان كربتو | الرئيسية</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Cairo', 'Tahoma', sans-serif;
      background: radial-gradient(circle at 10% 30%, #0a0f2a, #030617);
      min-height: 100vh;
      padding: 20px;
      position: relative;
    }

    /* خلفية نجوم */
    .stars {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }
    .star {
      position: absolute;
      background-color: #fff;
      border-radius: 50%;
      opacity: 0.6;
      animation: twinkle 3s infinite alternate;
    }
    @keyframes twinkle {
      0% { opacity: 0.2; transform: scale(1);}
      100% { opacity: 1; transform: scale(1.2);}
    }

    .app {
      max-width: 500px;
      margin: 0 auto;
      position: relative;
      z-index: 2;
    }

    /* كارد الزجاج */
    .glass-card {
      background: rgba(15, 25, 45, 0.65);
      backdrop-filter: blur(16px);
      border-radius: 32px;
      border: 1px solid rgba(255,255,255,0.2);
      padding: 20px;
      margin-bottom: 16px;
      transition: transform 0.2s;
    }

    /* الهيدر */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .welcome h2 {
      color: white;
      font-size: 20px;
    }
    .welcome p {
      color: #F0B90B;
      font-size: 13px;
    }
    .social-icons {
      display: flex;
      gap: 12px;
    }
    .social-icons a {
      color: white;
      font-size: 22px;
      transition: 0.2s;
    }
    .social-icons a:hover {
      color: #F0B90B;
    }

    /* شبكة الأزرار الرئيسية */
    .main-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
      margin-bottom: 16px;
    }
    .main-btn {
      background: rgba(240, 185, 11, 0.15);
      border: 1px solid rgba(240, 185, 11, 0.3);
      border-radius: 20px;
      padding: 12px 6px;
      text-align: center;
      cursor: pointer;
      transition: 0.2s;
    }
    .main-btn i {
      font-size: 24px;
      color: #F0B90B;
      margin-bottom: 6px;
      display: block;
    }
    .main-btn span {
      font-size: 12px;
      color: white;
    }
    .main-btn:hover {
      background: rgba(240, 185, 11, 0.3);
      transform: translateY(-2px);
    }

    /* أزرار إضافية */
    .extra-buttons {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
    }
    .extra-btn {
      flex: 1;
      background: linear-gradient(95deg, #F0B90B, #FFD966);
      border: none;
      border-radius: 40px;
      padding: 12px;
      font-weight: bold;
      font-size: 14px;
      color: #0a0f2a;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .extra-btn:hover {
      transform: translateY(-2px);
    }

    /* بطاقة الباقة */
    .package-card {
      background: linear-gradient(135deg, rgba(240,185,11,0.2), rgba(255,217,102,0.1));
      border: 1px solid rgba(240,185,11,0.4);
      border-radius: 28px;
      padding: 16px;
      margin-bottom: 16px;
    }
    .package-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .package-name {
      font-size: 22px;
      font-weight: bold;
      color: #F0B90B;
    }
    .package-status {
      background: #10b981;
      color: white;
      padding: 4px 12px;
      border-radius: 40px;
      font-size: 12px;
    }
    .package-info {
      display: flex;
      justify-content: space-between;
      margin-bottom: 12px;
      color: #ccc;
      font-size: 13px;
    }
    .timer-box {
      background: rgba(0,0,0,0.5);
      border-radius: 20px;
      padding: 12px;
      text-align: center;
      margin-top: 12px;
    }
    .timer-value {
      font-size: 28px;
      font-weight: bold;
      color: #F0B90B;
      font-family: monospace;
    }
    .timer-label {
      font-size: 12px;
      color: #aaa;
    }
    .daily-profit {
      color: #10b981;
      font-weight: bold;
      font-size: 16px;
    }

    /* إحصائيات */
    .stats-row {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
    }
    .stat-card {
      flex: 1;
      background: rgba(255,255,255,0.05);
      border-radius: 20px;
      padding: 12px;
      text-align: center;
    }
    .stat-value {
      font-size: 24px;
      font-weight: bold;
      color: #F0B90B;
    }
    .stat-label {
      font-size: 12px;
      color: #aaa;
    }

    /* آخر النشاط */
    .activity-list {
      max-height: 250px;
      overflow-y: auto;
    }
    .activity-item {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      font-size: 13px;
      color: #ddd;
    }
    .activity-icon {
      width: 30px;
      color: #F0B90B;
    }
    .empty-activity {
      text-align: center;
      padding: 20px;
      color: #aaa;
    }

    /* الشريط السفلي */
    .bottom-nav {
      display: flex;
      justify-content: space-around;
      background: rgba(15,25,45,0.9);
      backdrop-filter: blur(12px);
      border-radius: 40px;
      padding: 10px;
      margin-top: 10px;
    }
    .bottom-nav a {
      text-align: center;
      color: #aaa;
      text-decoration: none;
      font-size: 12px;
      transition: 0.2s;
    }
    .bottom-nav a i {
      font-size: 22px;
      display: block;
      margin-bottom: 4px;
    }
    .bottom-nav a.active {
      color: #F0B90B;
    }

    /* رسائل */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: #1e293b;
      color: white;
      padding: 12px 24px;
      border-radius: 50px;
      font-size: 14px;
      z-index: 1000;
      display: none;
      align-items: center;
      gap: 8px;
    }
    .toast.success { background: #10b981; }
    .toast.error { background: #ef4444; }

    @media (max-width: 500px) {
      .main-grid { gap: 6px; }
      .main-btn i { font-size: 20px; }
      .main-btn span { font-size: 10px; }
      .extra-btn { font-size: 12px; padding: 10px; }
    }
  </style>
</head>
<body>

<div class="stars" id="starsContainer"></div>

<div class="app">

  <!-- الهيدر مع الترحيب وأزرار التواصل -->
  <div class="glass-card">
    <div class="header">
      <div class="welcome">
        <h2 id="welcome">مرحباً، <span id="userName">...</span></h2>
        <p>أهلاً بك في منصتك الرقمية</p>
      </div>
      <div class="social-icons">
        <a href="https://wa.me/16727123329" target="_blank"><i class="fa-brands fa-whatsapp"></i></a>
        <a href="https://t.me/lool0002" target="_blank"><i class="fa-brands fa-telegram"></i></a>
      </div>
    </div>
  </div>

  <!-- الأزرار الرئيسية (5 أزرار) -->
  <div class="glass-card">
    <div class="main-grid">
      <div class="main-btn" onclick="location.href='dashboard.html'">
        <i class="fa-solid fa-house"></i>
        <span>الرئيسية</span>
      </div>
      <div class="main-btn" onclick="location.href='income.html'">
        <i class="fa-solid fa-chart-line"></i>
        <span>الدخل اليومي</span>
      </div>
      <div class="main-btn" onclick="location.href='referrals.html'">
        <i class="fa-solid fa-users"></i>
        <span>فريقي</span>
      </div>
      <div class="main-btn" onclick="location.href='packages.html'">
        <i class="fa-solid fa-sack-dollar"></i>
        <span>الباقات</span>
      </div>
      <div class="main-btn" onclick="location.href='about.html'">
        <i class="fa-solid fa-circle-info"></i>
        <span>عن المنصة</span>
      </div>
    </div>
  </div>

  <!-- أزرار إضافية (سحب - تحويل الأرباح) -->
  <div class="glass-card">
    <div class="extra-buttons">
      <button class="extra-btn" onclick="location.href='withdraw.html'">
        <i class="fa-solid fa-arrow-up"></i> سحب
      </button>
      <button class="extra-btn" onclick="transferIncome()">
        <i class="fa-solid fa-exchange-alt"></i> تحويل الأرباح
      </button>
    </div>
  </div>

  <!-- إحصائيات الرصيد والأرباح -->
  <div class="glass-card">
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-value" id="balance">0</div>
        <div class="stat-label">الرصيد (USDT)</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="income">0</div>
        <div class="stat-label">الأرباح (USDT)</div>
      </div>
    </div>
  </div>

  <!-- بطاقة الباقة (مع عداد زمني) -->
  <div class="package-card" id="packageCard">
    <div class="package-header">
      <span class="package-name" id="packageName">لا توجد باقة</span>
      <span class="package-status" id="packageStatus">غير مفعلة</span>
    </div>
    <div class="package-info">
      <span>📅 تاريخ البدء: <span id="startDate">-</span></span>
      <span>💰 الربح اليومي: <span id="dailyProfit">0</span> USDT</span>
    </div>
    <div class="timer-box">
      <div class="timer-value" id="remainingDays">0</div>
      <div class="timer-label">الأيام المتبقية</div>
    </div>
  </div>

  <!-- آخر النشاطات -->
  <div class="glass-card">
    <h3 style="color:white; margin-bottom:12px; font-size:16px;">آخر النشاطات</h3>
    <div class="activity-list" id="activityList">
      <div class="empty-activity">لا توجد نشاطات حالياً</div>
    </div>
  </div>

  <!-- الشريط السفلي -->
  <div class="bottom-nav">
    <a href="dashboard.html" class="active"><i class="fa-solid fa-house"></i>الرئيسية</a>
    <a href="packages.html"><i class="fa-solid fa-sack-dollar"></i>الباقات</a>
    <a href="referrals.html"><i class="fa-solid fa-users"></i>فريقي</a>
    <a href="profile.html"><i class="fa-solid fa-user"></i>حسابي</a>
  </div>

</div>

<div id="toast" class="toast"></div>

<script>
  const API_BASE = ""; // اتركه فارغاً إذا كان السيرفر في نفس الدومين

  // جلب بيانات المستخدم
  async function loadUserData() {
    const email = localStorage.getItem('userEmail');
    if (!email) {
      location.href = 'login.html';
      return;
    }

    try {
      const res = await fetch(`${API_BASE}/user-data?email=${email}`);
      const data = await res.json();
      if (data.success) {
        document.getElementById('userName').textContent = data.user.name;
        document.getElementById('balance').textContent = data.user.balance.toFixed(2);
        document.getElementById('income').textContent = data.user.income.toFixed(2);
        
        if (data.user.package) {
          document.getElementById('packageName').textContent = data.user.package.name;
          document.getElementById('packageStatus').textContent = 'مفعلة';
          document.getElementById('startDate').textContent = data.user.package.startDate;
          document.getElementById('dailyProfit').textContent = data.user.package.dailyProfit;
          document.getElementById('remainingDays').textContent = data.user.package.remainingDays;
        }
      }
    } catch (err) {
      console.error('Error loading user data:', err);
    }
  }

  function showToast(msg, isError = false) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.style.display = 'flex';
    toast.className = 'toast ' + (isError ? 'error' : 'success');
    setTimeout(() => { toast.style.display = 'none'; }, 3000);
  }

  async function transferIncome() {
    const email = localStorage.getItem('userEmail');
    showToast('جاري تحويل الأرباح...');
    try {
      const res = await fetch(`${API_BASE}/transfer-income`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email })
      });
      const data = await res.json();
      if (data.success) {
        showToast('تم تحويل الأرباح إلى الرصيد بنجاح');
        loadUserData();
      } else {
        showToast(data.message, true);
      }
    } catch (err) {
      showToast('خطأ في الاتصال', true);
    }
  }

  // إنشاء النجوم
  function createStars() {
    const container = document.getElementById('starsContainer');
    for (let i = 0; i < 150; i++) {
      const star = document.createElement('div');
      star.classList.add('star');
      star.style.width = (Math.random() * 3 + 1) + 'px';
      star.style.height = star.style.width;
      star.style.left = Math.random() * 100 + '%';
      star.style.top = Math.random() * 100 + '%';
      star.style.animationDelay = Math.random() * 5 + 's';
      star.style.animationDuration = (Math.random() * 3 + 2) + 's';
      container.appendChild(star);
    }
  }
  createStars();
  loadUserData();
</script>

<script>
  const name = localStorage.getItem("name");

  if (name) {
    document.getElementById("welcome").innerText = "مرحباً، " + name;
  }
</script>
</body>
</html>
