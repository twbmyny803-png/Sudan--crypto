<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>سودان كربتو | حسابي</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Cairo', sans-serif;
      background: radial-gradient(circle at 10% 30%, #0a0f2a, #030617);
      min-height: 100vh;
      padding: 20px;
      position: relative;
    }
    .stars {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }
    .star {
      position: absolute;
      background-color: #fff;
      border-radius: 50%;
      opacity: 0.6;
      animation: twinkle 3s infinite alternate;
    }
    @keyframes twinkle {
      0% { opacity: 0.2; transform: scale(1);}
      100% { opacity: 1; transform: scale(1.2);}
    }
    .container {
      max-width: 500px;
      margin: 0 auto;
      position: relative;
      z-index: 2;
    }
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(240,185,11,0.15);
      border: 1px solid rgba(240,185,11,0.3);
      border-radius: 40px;
      padding: 8px 20px;
      color: #F0B90B;
      text-decoration: none;
      font-size: 14px;
      margin-bottom: 16px;
      transition: 0.2s;
    }
    .glass-card {
      background: rgba(15, 25, 45, 0.65);
      backdrop-filter: blur(16px);
      border-radius: 28px;
      border: 1px solid rgba(255,255,255,0.2);
      padding: 24px;
      margin-bottom: 16px;
    }
    h2 {
      color: #F0B90B;
      font-size: 20px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-right: 3px solid #F0B90B;
      padding-right: 12px;
    }
    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .info-label {
      color: #aaa;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .info-value {
      color: white;
      font-weight: bold;
      font-size: 14px;
    }
    .loading-skeleton {
      background: rgba(255,255,255,0.1);
      border-radius: 8px;
      height: 16px;
      min-width: 100px;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }
    .btn {
      width: 100%;
      padding: 14px;
      border-radius: 40px;
      font-weight: bold;
      font-size: 15px;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 12px;
    }
    .btn-gold {
      background: linear-gradient(95deg, #F0B90B, #FFD966);
      border: none;
      color: #0a0f2a;
    }
    .btn-gold:hover {
      transform: translateY(-2px);
    }
    .btn-outline {
      background: transparent;
      border: 1px solid rgba(240,185,11,0.5);
      color: #F0B90B;
    }
    .btn-outline:hover {
      background: rgba(240,185,11,0.1);
    }
    .btn-danger {
      background: #ef4444;
      border: none;
      color: white;
    }
    .btn-danger:hover {
      background: #dc2626;
    }
    .social-buttons {
      display: flex;
      gap: 12px;
      margin-top: 12px;
    }
    .social-btn {
      flex: 1;
      padding: 12px;
      border-radius: 40px;
      text-align: center;
      text-decoration: none;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .whatsapp { background: #25D366; color: white; }
    .telegram { background: #26A5E4; color: white; }
    .verified-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(16,185,129,0.2);
      border: 1px solid #10b981;
      border-radius: 40px;
      padding: 4px 12px;
      font-size: 12px;
      color: #10b981;
    }
    .unverified-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(239,68,68,0.2);
      border: 1px solid #ef4444;
      border-radius: 40px;
      padding: 4px 12px;
      font-size: 12px;
      color: #ef4444;
    }
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      z-index: 99999;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(8px);
    }
    .modal-content {
      max-width: 400px;
      width: 90%;
      background: rgba(15,25,45,0.95);
      backdrop-filter: blur(16px);
      border-radius: 32px;
      padding: 24px;
      border: 1px solid rgba(240,185,11,0.3);
      position: relative;
      z-index: 100000;
    }
    .modal-content h3 {
      color: #F0B90B;
      margin-bottom: 16px;
      font-size: 20px;
    }
    .modal-content input, .modal-content select {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 40px;
      border: 1px solid rgba(240,185,11,0.3);
      background: rgba(10,20,35,0.8);
      color: white;
    }
    .modal-content button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 40px;
      font-weight: bold;
      cursor: pointer;
    }
    .file-label {
      display: block;
      color: #F0B90B;
      font-size: 13px;
      margin-top: 10px;
      margin-bottom: 5px;
    }
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      padding: 12px 24px;
      border-radius: 50px;
      font-size: 14px;
      z-index: 200000;
      display: none;
      align-items: center;
      gap: 8px;
    }
    .toast.success { background: #10b981; color: white; }
    .toast.error { background: #ef4444; color: white; }
  </style>
</head>
<body>

<div class="stars" id="starsContainer"></div>

<div class="container">

  <a href="dashboard.html" class="back-btn"><i class="fa-solid fa-arrow-right"></i> العودة</a>

  <div class="glass-card">
    <h2><i class="fa-solid fa-user-circle"></i> المعلومات الشخصية</h2>
    <div class="info-row">
      <div class="info-label"><i class="fa-regular fa-user"></i> الاسم</div>
      <div class="info-value" id="userName"><div class="loading-skeleton"></div></div>
    </div>
    <div class="info-row">
      <div class="info-label"><i class="fa-regular fa-envelope"></i> البريد الإلكتروني</div>
      <div class="info-value" id="userEmail"><div class="loading-skeleton"></div></div>
    </div>
    <div class="info-row">
      <div class="info-label"><i class="fa-solid fa-phone"></i> رقم الهاتف</div>
      <div class="info-value" id="userPhone"><div class="loading-skeleton"></div></div>
    </div>
  </div>

  <div class="glass-card">
    <h2><i class="fa-solid fa-shield-alt"></i> الأمان</h2>
    <button class="btn btn-gold" onclick="openPasswordModal()"><i class="fa-solid fa-key"></i> تغيير كلمة المرور</button>
    <button class="btn btn-outline" onclick="openWithdrawPasswordModal()"><i class="fa-solid fa-lock"></i> تعيين كلمة السحب</button>
  </div>

  <div class="glass-card">
    <h2><i class="fa-solid fa-id-card"></i> توثيق الحساب</h2>
    <div class="info-row">
      <div class="info-label"><i class="fa-solid fa-circle-check"></i> حالة التوثيق</div>
      <div class="info-value" id="verificationStatus">
        <span class="unverified-badge"><i class="fa-solid fa-times-circle"></i> غير موثق</span>
      </div>
    </div>
    <button class="btn btn-outline" onclick="openVerificationModal()"><i class="fa-solid fa-upload"></i> رفع مستندات التوثيق</button>
  </div>

  <div class="glass-card">
    <h2><i class="fa-solid fa-headset"></i> الدعم</h2>
    <div class="social-buttons">
      <a href="https://wa.me/16727123329" target="_blank" class="social-btn whatsapp"><i class="fa-brands fa-whatsapp"></i> واتساب</a>
      <a href="https://t.me/crypto_sudanees" target="_blank" class="social-btn telegram"><i class="fa-brands fa-telegram"></i> تليجرام</a>
    </div>
  </div>

  <div class="glass-card">
    <button class="btn btn-danger" onclick="logout()"><i class="fa-solid fa-sign-out-alt"></i> تسجيل الخروج</button>
  </div>

</div>

<!-- مودال تغيير كلمة المرور -->
<div id="passwordModal" class="modal">
  <div class="modal-content">
    <h3><i class="fa-solid fa-key"></i> تغيير كلمة المرور</h3>
    <input type="password" id="currentPassword" placeholder="كلمة المرور الحالية">
    <input type="password" id="newPassword" placeholder="كلمة المرور الجديدة (8 أحرف)">
    <input type="password" id="confirmNewPassword" placeholder="تأكيد كلمة المرور الجديدة">
    <button class="btn-gold" onclick="changePassword()">تغيير</button>
    <button class="btn-outline" onclick="closePasswordModal()">إلغاء</button>
  </div>
</div>

<!-- مودال تعيين كلمة السحب -->
<div id="withdrawPasswordModal" class="modal">
  <div class="modal-content">
    <h3><i class="fa-solid fa-lock"></i> تعيين كلمة السحب</h3>
    <p style="color:#aaa; font-size:12px; margin-bottom:8px;">⚠️ كلمة السحب مكونة من 6 أرقام، لا يمكن تغييرها بعد الحفظ</p>
    <input type="password" id="withdrawPass" placeholder="كلمة السحب (6 أرقام)" maxlength="6" inputmode="numeric">
    <input type="password" id="confirmWithdrawPass" placeholder="تأكيد كلمة السحب" maxlength="6">
    <button class="btn-gold" onclick="setWithdrawPassword()">حفظ</button>
    <button class="btn-outline" onclick="closeWithdrawPasswordModal()">إلغاء</button>
  </div>
</div>

<!-- مودال رفع مستندات التوثيق -->
<div id="verificationModal" class="modal">
  <div class="modal-content">
    <h3><i class="fa-solid fa-id-card"></i> توثيق الحساب</h3>
    <p style="color:#aaa; font-size:12px; margin-bottom:8px;">يرجى رفع صورة واضحة للمستند</p>
    <input type="text" id="fullName" placeholder="الاسم كما في المستند">
    <select id="docType" onchange="toggleFileInputs()">
      <option value="">اختر نوع المستند</option>
      <option value="بطاقة قومية">بطاقة قومية</option>
      <option value="جواز سفر">جواز سفر</option>
    </select>
    <input type="text" id="docNumber" placeholder="رقم المستند">
    
    <div id="idFiles" style="display:none;">
      <label class="file-label">الوجه الأمامي للبطاقة</label>
      <input type="file" id="frontFile" accept="image/*">
      <label class="file-label">الوجه الخلفي للبطاقة</label>
      <input type="file" id="backFile" accept="image/*">
    </div>

    <div id="passportFiles" style="display:none;">
      <label class="file-label">صورة جواز السفر</label>
      <input type="file" id="passportFile" accept="image/*">
    </div>

    <button class="btn-gold" onclick="submitVerification()">إرسال الطلب</button>
    <button class="btn-outline" onclick="closeVerificationModal()">إلغاء</button>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
  // ============================================
  // 🔧 إعدادات API والمتغيرات العامة
  // ============================================
  const API_BASE = 'https://sudan-crypto.onrender.com';
  const email = localStorage.getItem('userEmail');

  // إعادة توجيه إذا لم يكن المستخدم مسجل دخول
  if (!email) {
    window.location.replace('login.html');
  }

  // ============================================
  // 📢 دالة عرض الرسائل (Toast)
  // ============================================
  function showToast(msg, isError = false) {
    const t = document.getElementById('toast');
    t.innerText = msg;
    t.className = 'toast ' + (isError ? 'error' : 'success');
    t.style.display = 'flex';
    setTimeout(() => { t.style.display = 'none'; }, 3000);
  }

  // ============================================
  // 👤 دالة تحميل بيانات المستخدم (محسّنة)
  // ============================================
  async function loadUserData() {
    try {
      // 1️⃣ عرض حالة التحميل
      document.getElementById('userName').innerHTML = '<div class="loading-skeleton"></div>';
      document.getElementById('userEmail').innerHTML = '<div class="loading-skeleton"></div>';
      document.getElementById('userPhone').innerHTML = '<div class="loading-skeleton"></div>';

      // 2️⃣ جلب البيانات من السيرفر
      const res = await fetch(`${API_BASE}/user-data?email=${encodeURIComponent(email)}`);
      
      // 3️⃣ التحقق من حالة الاستجابة
      if (!res.ok) {
        throw new Error(`خطأ في الاتصال: ${res.status}`);
      }

      // 4️⃣ تحويل الاستجابة إلى JSON
      const data = await res.json();

      // 5️⃣ التحقق من نجاح الطلب
      if (!data.success) {
        throw new Error(data.message || 'فشل تحميل البيانات');
      }

      // 7️⃣ عرض بيانات المستخدم
      document.getElementById('userName').innerText = data.name || '-';
      document.getElementById('userEmail').innerText = data.email || '-';
      document.getElementById('userPhone').innerText = data.phone || '-';

      // 8️⃣ تحديث حالة التوثيق
      updateVerificationStatus(data);

    } catch (err) {
      console.error('❌ خطأ في loadUserData:', err);
      // عرض رسالة للمستخدم
      showToast('فشل تحميل البيانات. يرجى تحديث الصفحة', true);
    }
  }

  // ============================================
  // 🔐 دالة تحديث حالة التوثيق
  // ============================================
  function updateVerificationStatus(user) {
    const statusDiv = document.getElementById('verificationStatus');
    
    if (!statusDiv) return;

    if (user.isVerified) {
      statusDiv.innerHTML = '<span class="verified-badge"><i class="fa-solid fa-check-circle"></i> حساب موثق</span>';
    } else if (user.verificationStatus === 'pending') {
      statusDiv.innerHTML = '<span class="unverified-badge" style="background:rgba(240,185,11,0.2); border-color:#F0B90B; color:#F0B90B;"><i class="fa-solid fa-clock"></i> قيد المراجعة</span>';
    } else {
      statusDiv.innerHTML = '<span class="unverified-badge"><i class="fa-solid fa-times-circle"></i> غير موثق</span>';
    }
  }

  // ============================================
  // 🎯 دوال إدارة النوافذ المنبثقة
  // ============================================
  function toggleFileInputs() {
    const type = document.getElementById('docType').value;
    document.getElementById('idFiles').style.display = (type === 'بطاقة قومية') ? 'block' : 'none';
    document.getElementById('passportFiles').style.display = (type === 'جواز سفر') ? 'block' : 'none';
  }

  function openPasswordModal() { document.getElementById('passwordModal').style.display = 'flex'; }
  function closePasswordModal() { document.getElementById('passwordModal').style.display = 'none'; }

  function openWithdrawPasswordModal() { document.getElementById('withdrawPasswordModal').style.display = 'flex'; }
  function closeWithdrawPasswordModal() { document.getElementById('withdrawPasswordModal').style.display = 'none'; }

  function openVerificationModal() { 
    document.getElementById('verificationModal').style.display = 'flex';
    document.getElementById('fullName').value = '';
    document.getElementById('docType').value = '';
    document.getElementById('docNumber').value = '';
    document.getElementById('frontFile').value = '';
    document.getElementById('backFile').value = '';
    document.getElementById('passportFile').value = '';
    toggleFileInputs();
  }
  function closeVerificationModal() { document.getElementById('verificationModal').style.display = 'none'; }

  // ============================================
  // 🔑 دالة تغيير كلمة المرور
  // ============================================
  async function changePassword() {
    const oldPass = document.getElementById('currentPassword').value;
    const newPass = document.getElementById('newPassword').value;
    const confirmPass = document.getElementById('confirmNewPassword').value;

    if (!oldPass || !newPass || !confirmPass) {
      showToast('يرجى ملء جميع الحقول', true);
      return;
    }
    if (newPass !== confirmPass) {
      showToast('كلمات المرور الجديدة غير متطابقة', true);
      return;
    }
    if (newPass.length < 8) {
      showToast('كلمة المرور يجب أن تكون 8 أحرف على الأقل', true);
      return;
    }

    try {
      const res = await fetch(`${API_BASE}/change-password`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, oldPass, newPass })
      });
      const data = await res.json();
      if (data.success) {
        showToast('تم تغيير كلمة المرور بنجاح');
        closePasswordModal();
        // مسح الحقول
        document.getElementById('currentPassword').value = '';
        document.getElementById('newPassword').value = '';
        document.getElementById('confirmNewPassword').value = '';
      } else {
        showToast(data.message || 'فشل تغيير كلمة المرور', true);
      }
    } catch (err) {
      console.error(err);
      showToast('خطأ في الاتصال', true);
    }
  }

  // ============================================
  // 🔐 دالة تعيين كلمة السحب
  // ============================================
  async function setWithdrawPassword() {
    const pass = document.getElementById('withdrawPass').value;
    const confirm = document.getElementById('confirmWithdrawPass').value;

    if (pass.length !== 6 || isNaN(pass)) {
      showToast('كلمة السحب يجب أن تكون 6 أرقام', true);
      return;
    }
    if (pass !== confirm) {
      showToast('كلمات المرور غير متطابقة', true);
      return;
    }

    try {
      const res = await fetch(`${API_BASE}/set-withdraw-password`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, withdrawPassword: pass })
      });
      const data = await res.json();
      if (data.success) {
        showToast('تم تعيين كلمة السحب بنجاح');
        closeWithdrawPasswordModal();
        // مسح الحقول
        document.getElementById('withdrawPass').value = '';
        document.getElementById('confirmWithdrawPass').value = '';
      } else {
        showToast(data.message || 'فشل تعيين كلمة السحب', true);
      }
    } catch (err) {
      console.error(err);
      showToast('خطأ في الاتصال', true);
    }
  }

  // ============================================
  // 📋 دالة إرسال طلب التوثيق
  // ============================================
  async function submitVerification() {
    const fullName = document.getElementById('fullName').value.trim();
    const docType = document.getElementById('docType').value;
    const docNumber = document.getElementById('docNumber').value.trim();
    
    if (!fullName || !docType || !docNumber) {
      showToast('يرجى ملء جميع البيانات', true);
      return;
    }
    
    let file1 = null, file2 = null;
    
    if (docType === 'بطاقة قومية') {
      file1 = document.getElementById('frontFile').files[0];
      file2 = document.getElementById('backFile').files[0];
      if (!file1 || !file2) {
        showToast('يرجى رفع الوجه الأمامي والخلفي للبطاقة', true);
        return;
      }
    } else if (docType === 'جواز سفر') {
      file1 = document.getElementById('passportFile').files[0];
      if (!file1) {
        showToast('يرجى رفع صورة جواز السفر', true);
        return;
      }
    }
    
    const formData = new FormData();
    formData.append('email', email);
    formData.append('fullName', fullName);
    formData.append('docType', docType);
    formData.append('docNumber', docNumber);
    formData.append('file', file1);
    if (file2) formData.append('file2', file2);
    
    try {
      const res = await fetch(`${API_BASE}/submit-verification`, { method: 'POST', body: formData });
      const data = await res.json();
      if (data.success) {
        showToast('تم إرسال طلب التوثيق بنجاح');
        closeVerificationModal();
      } else {
        showToast(data.message || 'فشل إرسال الطلب', true);
      }
    } catch (err) {
      console.error(err);
      showToast('خطأ في الاتصال', true);
    }
  }

  // ============================================
  // 🚪 دالة تسجيل الخروج
  // ============================================
  function logout() {
    localStorage.removeItem('userEmail');
    window.location.replace('login.html');
  }

  // ============================================
  // ⭐ دالة إنشاء النجوم المتحركة
  // ============================================
  function createStars() {
    const container = document.getElementById('starsContainer');
    for (let i = 0; i < 150; i++) {
      const star = document.createElement('div');
      star.classList.add('star');
      star.style.width = (Math.random() * 3 + 1) + 'px';
      star.style.height = star.style.width;
      star.style.left = Math.random() * 100 + '%';
      star.style.top = Math.random() * 100 + '%';
      star.style.animationDelay = Math.random() * 5 + 's';
      star.style.animationDuration = (Math.random() * 3 + 2) + 's';
      container.appendChild(star);
    }
  }

  // ============================================
  // 🚀 تشغيل الدوال عند تحميل الصفحة
  // ============================================
  createStars();
  loadUserData();

</script>

</body>
    </html>
