<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Admin Login</title>
<style>
body{
  background:#0b1220;
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:Arial;
}
.box{
  background:#111827;
  padding:30px;
  border-radius:20px;
  width:300px;
  text-align:center;
}
input{
  width:100%;
  padding:10px;
  margin:10px 0;
  border:none;
  border-radius:10px;
}
button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#f0b90b;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="box">
  <h2>دخول الأدمن</h2>
  <input type="text" id="user" placeholder="Username">
  <input type="password" id="pass" placeholder="Password">
  <button onclick="login()">دخول</button>
</div>

<script>
function login(){
  const u = document.getElementById("user").value;
  const p = document.getElementById("pass").value;

  if(u === "admain" && p === "admain_2030"){
    localStorage.setItem("admin","true");
    window.location.href = "admin-dashboard.html";
  }else{
    alert("خطأ في البيانات");
  }
}
</script>

</body>
</html>
