<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>طلبات السحب</title>

<style>
body {
  background:#eef1f6;
  font-family:Cairo;
  margin:0;
}

.header {
  background:#0a0f2a;
  color:white;
  padding:15px;
  text-align:center;
}

.container {
  padding:20px;
}

button {
  padding:8px 12px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.refresh {
  background:#3b82f6;
  color:white;
  float:left;
}

table {
  width:100%;
  border-collapse:collapse;
  background:white;
  margin-top:20px;
  border-radius:10px;
  overflow:hidden;
}

th {
  background:#f3f4f6;
  padding:10px;
}

td {
  padding:10px;
  text-align:center;
}

tr {
  border-bottom:1px solid #ddd;
}

.actions button {
  margin:2px;
}

.approve { background:#10b981; color:white }
.reject { background:#ef4444; color:white }

.loading {
  text-align:center;
  padding:20px;
  color:#666;
}
</style>

</head>

<body>

<div class="header">طلبات السحب 💸</div>

<div class="container">

<button class="refresh" onclick="loadWithdraws()">تحديث</button>

<table>
<thead>
<tr>
<th>البريد</th>
<th>المبلغ</th>
<th>الشبكة</th>
<th>عنوان المحفظة</th>
<th>الحالة</th>
<th>التاريخ</th>
<th>التحكم</th>
</tr>
</thead>

<tbody id="withdrawTable">
<tr><td colspan="7" class="loading">جاري التحميل...</td></tr>
</tbody>
</table>

</div>

<script>
const API = "https://sudan-crypto-4mgt.onrender.com";

// 🔒 حماية الأدمن
if(localStorage.getItem("admin") !== "ok"){
  window.location = "admin-login.html";
}

async function loadWithdraws(){
  const table = document.getElementById("withdrawTable");
  table.innerHTML = `<tr><td colspan="7" class="loading">جاري التحميل...</td></tr>`;

  try {
    const res = await fetch(API + "/admin-withdraws");
    const data = await res.json();

    table.innerHTML = "";

    data.withdraws.forEach(w => {

      const row = `
      <tr>
        <td>${w.email}</td>
        <td>${w.amount}</td>
        <td>${w.network || "-"}</td>
        <td>${w.walletAddress || "-"}</td>
        <td>${w.status || "pending"}</td>
        <td>${w.date || "-"}</td>
        <td class="actions">
          <button class="approve" onclick="approve('${w.id}')">قبول</button>
          <button class="reject" onclick="reject('${w.id}')">رفض</button>
        </td>
      </tr>
      `;

      table.innerHTML += row;
    });

  } catch(err) {
    table.innerHTML = `<tr><td colspan="7">❌ فشل تحميل الطلبات</td></tr>`;
  }
}

// ✅ قبول
async function approve(id){
  await fetch(API + "/admin-approve-withdraw",{
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({id})
  });

  loadWithdraws();
}

// ❌ رفض
async function reject(id){
  await fetch(API + "/admin-reject-withdraw",{
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({id})
  });

  loadWithdraws();
}

loadWithdraws();
</script>

</body>
</html>
