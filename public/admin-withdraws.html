<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>طلبات السحب</title>

<style>
body {
  background:#eef1f6;
  font-family:Cairo;
  margin:0;
}

.header {
  background:#0a0f2a;
  color:white;
  padding:15px;
  text-align:center;
}

.container {
  padding:20px;
}

button {
  padding:8px 12px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.refresh {
  background:#3b82f6;
  color:white;
  float:left;
}

table {
  width:100%;
  border-collapse:collapse;
  background:white;
  margin-top:20px;
  border-radius:10px;
  overflow:hidden;
}

th {
  background:#f3f4f6;
  padding:10px;
}

td {
  padding:10px;
  text-align:center;
}

tr {
  border-bottom:1px solid #ddd;
}

.actions button {
  margin:2px;
}

.approve { background:#10b981; color:white }
.reject { background:#ef4444; color:white }
.edit { background:#f59e0b; color:white }

.loading {
  text-align:center;
  padding:20px;
  color:#666;
}
</style>

</head>

<body>

<div class="header">طلبات السحب</div>

<div class="container">

<button class="refresh" onclick="loadWithdraws()">تحديث</button>

<table>
<thead>
<tr>
<th>البريد</th>
<th>المبلغ</th>
<th>عنوان المحفظة</th>
<th>الحالة</th>
<th>التاريخ</th>
<th>التحكم</th>
</tr>
</thead>

<tbody id="withdrawTable">
<tr><td colspan="6" class="loading">جاري التحميل...</td></tr>
</tbody>
</table>

</div>

<script>
const API = "https://sudan-crypto-4mgt.onrender.com";

// 🔒 حماية الأدمن
if(localStorage.getItem("admin") !== "ok"){
  window.location = "admin-login.html";
}

async function loadWithdraws(){
  const table = document.getElementById("withdrawTable");
  table.innerHTML = `<tr><td colspan="6" class="loading">جاري التحميل...</td></tr>`;

  try {
    const res = await fetch(API + "/admin-withdraws");
    const data = await res.json();

    table.innerHTML = "";

    if (!data.success || !data.requests.length) {
      table.innerHTML = `<tr><td colspan="6">لا توجد طلبات</td></tr>`;
      return;
    }

    data.requests.forEach(w => {

      const row = `
      <tr>
        <td>${w.email}</td>
        <td>${w.amount} USDT</td>
        <td>${w.wallet || "-"}</td>
        <td>${w.status}</td>
        <td>${new Date(w.createdAt).toLocaleString('ar-EG')}</td>
        <td class="actions">
          ${w.status === "pending" ? `
            <button class="approve" onclick="approve('${w._id}')">قبول</button>
            <button class="reject" onclick="reject('${w._id}')">رفض</button>
            <button class="edit" onclick="editWallet('${w.email}', '${w.wallet || ""}')">
              تعديل
            </button>
          ` : "-"}
        </td>
      </tr>
      `;

      table.innerHTML += row;
    });

  } catch(err) {
    console.log(err);
    table.innerHTML = `<tr><td colspan="6">فشل تحميل الطلبات</td></tr>`;
  }
}

// ✅ قبول
async function approve(id){
  await fetch(API + "/admin-approve-withdraw",{
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({id})
  });

  loadWithdraws();
}

// ❌ رفض
async function reject(id){
  await fetch(API + "/admin-reject-withdraw",{
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({id})
  });

  loadWithdraws();
}

// ✏️ تعديل العنوان
async function editWallet(email, currentWallet){

  const newWallet = prompt("أدخل العنوان الجديد", currentWallet);

  if (!newWallet) return;

  const res = await fetch(API + "/admin-update-wallet",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      email: email,
      newWallet: newWallet
    })
  });

  const data = await res.json();

  if(data.success){
    alert("تم تعديل العنوان بنجاح");
    loadWithdraws();
  } else {
    alert(data.message || "فشل التعديل");
  }
}

loadWithdraws();
</script>

</body>
</html>
