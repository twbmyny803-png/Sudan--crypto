<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تحقق</title>

<style>
body{
  background:#020617;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:Arial;
}

.container{
  text-align:center;
}

.code-box{
  display:flex;
  gap:10px;
  justify-content:center;
  margin:20px 0;
}

input{
  width:50px;
  height:50px;
  text-align:center;
  font-size:20px;
  border:none;
  border-radius:10px;
  background:#111827;
  color:white;
}

button{
  padding:12px 20px;
  background:#2563eb;
  border:none;
  border-radius:10px;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<h2>أدخل كود التحقق</h2>

<div class="code-box">
<input maxlength="1">
<input maxlength="1">
<input maxlength="1">
<input maxlength="1">
<input maxlength="1">
<input maxlength="1">
</div>

<button onclick="verify()">تحقق</button>

</div>

<script>

const inputs = document.querySelectorAll("input");

// التنقل التلقائي
inputs.forEach((input, index)=>{
  input.addEventListener("input", ()=>{
    if(input.value && index < inputs.length-1){
      inputs[index+1].focus();
    }
  });
});

// إرسال الكود
function verify(){

  let code = "";
  inputs.forEach(i => code += i.value);

  const email = localStorage.getItem("email");

  fetch("https://sudan-crypto-4mgt.onrender.com/verify", {
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      email,
      code
    })
  })
  .then(res => res.json())
  .then(data=>{
    if(data.success){
      alert("تم التحقق بنجاح");
      window.location.href = "login.html";
    }else{
      alert("كود التحقق غير صحيح");
    }
  })
  .catch(err => {
    console.error("Error:", err);
    alert("حدث خطأ في الاتصال بالسيرفر");
  });
}

</script>

</body>
</html>
