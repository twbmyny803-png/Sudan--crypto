<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <title>تفاصيل الطلب</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            background: linear-gradient(145deg, #0a0f1a, #0c1325);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            padding: 40px 20px;
            color: white;
        }
        .container {
            max-width: 600px;
            margin: auto;
            background: rgba(15,22,40,0.95);
            border-radius: 32px;
            padding: 32px;
            border: 1px solid #f5b042;
        }
        .title {
            font-size: 28px;
            text-align: center;
            color: #f5b042;
            margin-bottom: 25px;
        }
        .row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #2a3a50;
        }
        .pay-btn {
            background: #f5b042;
            color: #1a1f2f;
            padding: 14px;
            border-radius: 40px;
            text-align: center;
            font-weight: bold;
            font-size: 18px;
            margin-top: 25px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="title"><i class="fas fa-clipboard-list"></i> تفاصيل الطلب</div>
    <div class="row"><span><i class="fas fa-gem"></i> الباقة</span><span id="pkgName">-</span></div>
    <div class="row"><span><i class="fas fa-dollar-sign"></i> المبلغ</span><span id="pkgPrice">-</span></div>
    <div class="row"><span><i class="fas fa-chart-line"></i> الربح اليومي</span><span id="dailyProfit">-</span></div>
    <div class="row"><span><i class="fas fa-calendar-alt"></i> مدة الباقة</span><span>280 يوم</span></div>
    <div class="row"><span><i class="fas fa-hashtag"></i> رقم الطلب</span><span id="orderNumber">-</span></div>
    
    <div class="pay-btn" id="goToPayment">
        <i class="fas fa-credit-card"></i> إتمام الدفع
    </div>
</div>

<script>
    const pkgName = localStorage.getItem('selectedPackage') || 'الباقة البرونزية';
    const pkgPrice = localStorage.getItem('selectedPrice') || '50 $';
    const daily = localStorage.getItem('dailyProfit') || '2 $';
    document.getElementById('pkgName').innerText = pkgName;
    document.getElementById('pkgPrice').innerText = pkgPrice;
    document.getElementById('dailyProfit').innerText = daily;

    let orderNumber = localStorage.getItem('orderNumber');
    if (!orderNumber) {
        orderNumber = 'ORD' + Math.floor(Math.random() * 1000000000000) + Date.now().toString().slice(-6);
        localStorage.setItem('orderNumber', orderNumber);
    }
    document.getElementById('orderNumber').innerText = orderNumber;

    document.getElementById('goToPayment').onclick = () => {
        window.location.href = 'payment.html';
    };
</script>
</body>
</html>
