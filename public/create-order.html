<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تفاصيل الطلب - باقات الاستثمار</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #0a0f1a 0%, #0c1325 100%);
            font-family: 'Segoe UI', 'Tahoma', system-ui, sans-serif;
            padding: 40px 20px;
            min-height: 100vh;
            position: relative;
        }

        .stars-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .star-bg {
            position: absolute;
            background: radial-gradient(white, rgba(255,255,255,0.3));
            border-radius: 50%;
            animation: twinkle 3s infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.2; transform: scale(0.8);}
            50% { opacity: 1; transform: scale(1.2);}
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        .back-btn {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(245,176,66,0.4);
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            color: #f5b042;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 25px;
        }

        .back-btn:hover {
            background: rgba(245,176,66,0.2);
            transform: translateX(-3px);
        }

        .order-card {
            background: rgba(15, 22, 40, 0.95);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            border: 1px solid rgba(245, 176, 66, 0.5);
            padding: 32px;
        }

        .title {
            font-size: 28px;
            font-weight: bold;
            text-align: center;
            background: linear-gradient(90deg, #f5b042, #ffd966);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 28px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 0;
            border-bottom: 1px solid rgba(245,176,66,0.2);
        }

        .info-label {
            color: #f5b042;
            font-size: 18px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .info-value {
            color: #ffffff;
            font-size: 18px;
            font-weight: 500;
        }

        .highlight-value {
            color: #4caf50;
            font-size: 20px;
            font-weight: bold;
        }

        .order-number-box {
            background: rgba(0,0,0,0.5);
            border-radius: 20px;
            padding: 15px;
            text-align: center;
            margin: 20px 0;
            border-right: 4px solid #f5b042;
        }

        /* اختيار الشبكة - عمودي تحت بعض */
        .network-section {
            margin: 25px 0;
        }

        .network-title {
            color: #f5b042;
            font-size: 18px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .network-options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .network-option {
            background: rgba(0,0,0,0.4);
            border: 2px solid rgba(245,176,66,0.3);
            border-radius: 20px;
            padding: 16px 20px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .network-option.active {
            border-color: #f5b042;
            background: rgba(245,176,66,0.15);
        }

        .network-option i {
            font-size: 28px;
            width: 40px;
            text-align: center;
        }

        .network-option span {
            font-size: 18px;
            font-weight: bold;
            color: #ffd966;
        }

        .pay-btn {
            width: 100%;
            background: linear-gradient(90deg, #f5b042, #ffd966);
            border: none;
            padding: 16px;
            font-size: 20px;
            font-weight: bold;
            color: #1a1f2f;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 25px;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .pay-btn:hover {
            opacity: 0.9;
            transform: scale(0.98);
        }
    </style>
</head>
<body>
<div class="stars-bg" id="starsContainer"></div>

<div class="container">
    <button class="back-btn" id="backBtn">
        <i class="fas fa-arrow-right"></i> رجوع للباقات
    </button>

    <div class="order-card">
        <div class="title">
            <i class="fas fa-clipboard-list"></i> تفاصيل الطلب
        </div>

        <div class="info-row">
            <div class="info-label"><i class="fas fa-gem"></i> الباقة</div>
            <div class="info-value" id="packageName">-</div>
        </div>

        <div class="info-row">
            <div class="info-label"><i class="fas fa-dollar-sign"></i> المبلغ</div>
            <div class="info-value" id="packagePrice">- USDT</div>
        </div>

        <div class="info-row">
            <div class="info-label"><i class="fas fa-chart-line"></i> الربح اليومي</div>
            <div class="info-value highlight-value" id="dailyProfit">- $</div>
        </div>

        <div class="info-row">
            <div class="info-label"><i class="fas fa-calendar-alt"></i> مدة الباقة</div>
            <div class="info-value">280 يوم</div>
        </div>

        <div class="order-number-box">
            <span><i class="fas fa-hashtag"></i> رقم الطلب</span>
            <span id="orderNumber">-</span>
        </div>

        <!-- اختيار الشبكة فقط (عمودي) -->
        <div class="network-section">
            <div class="network-title">
                <i class="fas fa-network-wired"></i> اختر شبكة الدفع
            </div>
            <div class="network-options" id="networkOptions">
                <div class="network-option" data-network="BEP20">
                    <i class="fab fa-bitcoin"></i>
                    <span>USDT BEP20</span>
                </div>
                <div class="network-option" data-network="TRC20">
                    <i class="fab fa-tron"></i>
                    <span>USDT TRC20</span>
                </div>
            </div>
        </div>

        <button class="pay-btn" id="goToPaymentBtn">
            <i class="fas fa-credit-card"></i> إتمام الدفع
        </button>
    </div>
</div>

<script>
    // نجوم متحركة
    const starsContainer = document.getElementById('starsContainer');
    for (let i = 0; i < 150; i++) {
        const star = document.createElement('div');
        star.classList.add('star-bg');
        const size = Math.random() * 3 + 1;
        star.style.width = size + 'px';
        star.style.height = size + 'px';
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        star.style.animationDelay = Math.random() * 5 + 's';
        star.style.animationDuration = Math.random() * 3 + 2 + 's';
        starsContainer.appendChild(star);
    }

    // عناوين الدفع (ستستخدم في الصفحة التالية)
    const walletAddresses = {
        BEP20: '0x742d35Cc6634C0532925a3b844Bc9e7595f0bEb0',
        TRC20: 'TXLAq9Y2Xr8hGQ5qZkLp3xVnRwJmY7cFbD'
    };

    // قراءة بيانات الباقة
    let packageName = localStorage.getItem('selectedPackage') || 'الباقة البرونزية';
    let packagePrice = localStorage.getItem('selectedPrice') || '50 $';
    let dailyProfit = localStorage.getItem('dailyProfit') || '2 $';

    packageName = packageName.replace(/[🟢🔴🟡⭐]/g, '').trim();
    packagePrice = packagePrice.replace('USDT', '').trim();

    document.getElementById('packageName').innerText = packageName;
    document.getElementById('packagePrice').innerHTML = `${packagePrice} <span style="color:#aaa;">USDT</span>`;
    document.getElementById('dailyProfit').innerHTML = `${dailyProfit} <span style="color:#aaa;">/ يومياً</span>`;

    // رقم طلب
    let orderNumber = localStorage.getItem('orderNumber');
    if (!orderNumber) {
        orderNumber = 'ORD' + Math.floor(Math.random() * 1000000000000) + Date.now().toString().slice(-6);
        localStorage.setItem('orderNumber', orderNumber);
    }
    document.getElementById('orderNumber').innerText = orderNumber;

    // اختيار الشبكة
    let currentNetwork = 'BEP20';
    const networkOptions = document.querySelectorAll('.network-option');

    function updateNetworkSelection() {
        networkOptions.forEach(opt => {
            if (opt.getAttribute('data-network') === currentNetwork) {
                opt.classList.add('active');
            } else {
                opt.classList.remove('active');
            }
        });
        localStorage.setItem('selectedNetwork', currentNetwork);
        localStorage.setItem('selectedWalletAddress', walletAddresses[currentNetwork]);
    }

    networkOptions.forEach(opt => {
        opt.addEventListener('click', () => {
            currentNetwork = opt.getAttribute('data-network');
            updateNetworkSelection();
        });
    });
    updateNetworkSelection();

    // رجوع
    document.getElementById('backBtn').addEventListener('click', () => {
        window.location.href = 'packages.html';
    });

    // إتمام الدفع
    document.getElementById('goToPaymentBtn').addEventListener('click', () => {
        localStorage.setItem('selectedNetwork', currentNetwork);
        localStorage.setItem('selectedWalletAddress', walletAddresses[currentNetwork]);
        window.location.href = 'payment.html';
    });
</script>
</body>
                </html>
