<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>طلبات الإيداع</title>
<style>
body { background:#0a0f2a; color:white; font-family:Cairo; padding:20px }
table { width:100%; border-collapse:collapse; margin-top:20px }
td, th { padding:10px; border:1px solid #444 }
button { padding:5px 10px; margin:2px; cursor:pointer }
</style>
</head>

<body>

<h2>طلبات الإيداع 💰</h2>

<table>
<thead>
<tr>
<th>البريد</th>
<th>المبلغ</th>
<th>الحالة</th>
<th>تحكم</th>
</tr>
</thead>
<tbody id="depositTable"></tbody>
</table>

<script>
const API = "https://sudan-crypto-4mgt.onrender.com";

async function loadDeposits(){
  const res = await fetch(API + "/admin-deposits");
  const data = await res.json();

  const table = document.getElementById("depositTable");
  table.innerHTML = "";

  data.deposits.forEach(d => {
    const row = `
    <tr>
      <td>${d.email}</td>
      <td>${d.amount}</td>
      <td>${d.status || "pending"}</td>
      <td>
        <button onclick="approve('${d.id}')">قبول</button>
        <button onclick="reject('${d.id}')">رفض</button>
      </td>
    </tr>
    `;
    table.innerHTML += row;
  });
}

async function approve(id){
  await fetch(API + "/admin-approve-deposit", {
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({ id })
  });
  loadDeposits();
}

async function reject(id){
  await fetch(API + "/admin-reject-deposit", {
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({ id })
  });
  loadDeposits();
}

loadDeposits();
</script>

</body>
</html>
