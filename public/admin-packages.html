<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>إدارة الباقات</title>
<style>
body { background:#0a0f2a; color:white; font-family:Cairo; padding:20px }

input, select {
  width:100%;
  padding:10px;
  margin:10px 0;
}

button {
  padding:10px;
  margin:5px;
  cursor:pointer;
}
</style>
</head>

<body>

<h2>📦 إدارة الباقات والرصيد</h2>

<!-- الرصيد -->
<input id="email" placeholder="البريد">
<input id="amount" placeholder="المبلغ">

<button onclick="addBalance()">➕ زيادة رصيد</button>
<button onclick="minusBalance()">➖ خصم رصيد</button>

<hr>

<!-- الباقات -->
<select id="packageSelect" onchange="updatePackage()">
  <option value="">اختر الباقة</option>
  <option value="starter">Starter</option>
  <option value="silver">Silver</option>
  <option value="gold">Gold</option>
  <option value="platinum">Platinum</option>
  <option value="vip">VIP</option>
</select>

<input id="dailyProfit" placeholder="الربح اليومي" readonly>
<input id="days" value="280" readonly>

<button onclick="addPackage()">📦 إضافة باقة</button>

<script>
const API = "https://sudan-crypto-4mgt.onrender.com";

// 🔥 تعريف الباقات
const packages = {
  starter: { name: "Starter", profit: 2 },
  silver: { name: "Silver", profit: 5 },
  gold: { name: "Gold", profit: 10 },
  platinum: { name: "Platinum", profit: 20 },
  vip: { name: "VIP", profit: 50 }
};

function updatePackage(){
  const selected = document.getElementById("packageSelect").value;

  if(!selected) return;

  document.getElementById("dailyProfit").value = packages[selected].profit;
}

// 💰 زيادة رصيد
async function addBalance(){
  const email = document.getElementById("email").value;
  const amount = document.getElementById("amount").value;

  await fetch(API+"/admin-add-balance",{
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({email, amount})
  });

  alert("تمت الإضافة");
}

// 💸 خصم رصيد
async function minusBalance(){
  const email = document.getElementById("email").value;
  const amount = document.getElementById("amount").value;

  await fetch(API+"/admin-minus-balance",{
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({email, amount})
  });

  alert("تم الخصم");
}

// 📦 إضافة باقة
async function addPackage(){
  const email = document.getElementById("email").value;
  const selected = document.getElementById("packageSelect").value;

  await fetch(API+"/admin-add-package",{
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      email,
      packageName: packages[selected].name,
      dailyProfit: packages[selected].profit,
      durationDays: 280
    })
  });

  alert("تم إضافة الباقة");
}
</script>

</body>
  </html>
